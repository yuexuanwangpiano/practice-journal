// ---- Year Calendar View ----
let calViewYear = new Date().getFullYear();
let calViewMonth = null; // null = year mode, 0-11 = month drill-down

function changeYearCal(dir) {
  if (calViewMonth !== null) {
    // Navigate months
    calViewMonth += dir;
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    renderCalView();
  } else {
    calViewYear += dir;
    renderCalView();
  }
}

function renderCalView() {
  const title = document.getElementById('year-cal-title');
  const body = document.getElementById('year-cal-body');
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS_SHORT = ['S','M','T','W','T','F','S'];
  const now = new Date();

  if (calViewMonth === null) {
    // ---- Year mode ----
    title.textContent = calViewYear;
    body.className = 'year-cal-body year-mode';
    body.innerHTML = '';

    for (let m = 0; m < 12; m++) {
      const card = document.createElement('div');
      const isCurrent = m === now.getMonth() && calViewYear === now.getFullYear();
      card.className = 'ycal-month-card' + (isCurrent ? ' current-month' : '');

      let html = `<div class="ycal-month-name">${MONTHS_SHORT[m]}</div><div class="ycal-mini-grid">`;
      DAYS_SHORT.forEach(d => { html += `<div class="ycal-mini-cell label">${d}</div>`; });

      const firstDay = new Date(calViewYear, m, 1).getDay();
      const daysInMonth = new Date(calViewYear, m + 1, 0).getDate();
      for (let i = 0; i < firstDay; i++) html += `<div class="ycal-mini-cell"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${calViewYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = d === now.getDate() && m === now.getMonth() && calViewYear === now.getFullYear();
        const hasEntry = entries[key] && (entries[key].blocks?.some(b => b.piece || b.note) || entries[key].recordings?.length);
        const hasGoal = goals.some(g => g.date === key && !g.done);
        const hasGoalDone = !hasGoal && goals.some(g => g.date === key && g.done);
        let cls = 'ycal-mini-cell';
        if (isToday) cls += ' today';
        if (hasEntry) cls += ' has-entry';
        if (hasGoal) cls += ' has-goal';
        else if (hasGoalDone) cls += ' has-goal-done';
        html += `<div class="${cls}">${d}</div>`;
      }
      html += `</div>`;
      card.innerHTML = html;
      card.onclick = () => { calViewMonth = m; renderCalView(); };
      body.appendChild(card);
    }
  } else {
    // ---- Month drill-down mode — same layout as Log/Goals calendar ----
    title.textContent = `${MONTHS_FULL[calViewMonth]} ${calViewYear}`;
    body.className = 'year-cal-body month-mode';
    body.innerHTML = '';

    // Back button
    const back = document.createElement('button');
    back.className = 'ycal-back-btn';
    back.innerHTML = '‹ ' + calViewYear;
    back.onclick = () => { calViewMonth = null; renderCalView(); };
    body.appendChild(back);

    // Calendar grid — identical CSS classes to Log/Goals cal
    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // Day labels row (S M T W T F S)
    ['S','M','T','W','T','F','S'].forEach(d => {
      const lbl = document.createElement('div');
      lbl.className = 'cal-day-label';
      lbl.textContent = d;
      grid.appendChild(lbl);
    });

    const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
    const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
    const daysInPrev = new Date(calViewYear, calViewMonth, 0).getDate();

    // Prev-month overflow
    for (let i = firstDay - 1; i >= 0; i--) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.innerHTML = `<span class="cal-day-num">${daysInPrev - i}</span>`;
      grid.appendChild(el);
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = d === now.getDate() && calViewMonth === now.getMonth() && calViewYear === now.getFullYear();
      const hasEntry = entries[key] && (entries[key].blocks?.some(b => b.piece || b.note) || entries[key].recordings?.length);
      const activeGoalCV = goals.find(g => g.date === key && !g.done);
      const hasGoal = !!activeGoalCV;
      const hasGoalDone = !hasGoal && goals.some(g => g.date === key && g.done);
      const activeMiniCV = miniGoals.find(m => m.date === key && !m.done);
      const hasMiniGoal = !!activeMiniCV;
      const hasMiniGoalDone = !hasMiniGoal && miniGoals.some(m => m.date === key && m.done);

      const el = document.createElement('div');
      el.className = 'cal-day'
        + (isToday ? ' today' : '')
        + (hasEntry ? ' has-entry' : '')
        + (hasGoal ? ' has-goal' : hasGoalDone ? ' has-goal-done' : '')
        + (hasMiniGoal ? ' has-mini-goal' : hasMiniGoalDone ? ' has-mini-goal-done' : '');
      if (hasGoal) el.style.setProperty('--star-color', activeGoalCV.color || '#b89a6a');
      el.innerHTML = `<span class="cal-day-num">${d}</span>`;
      if (hasEntry || hasGoal) el.onclick = () => openDayModal(key);
      grid.appendChild(el);
    }

    body.appendChild(grid);

    // Entries list below the grid
    const monthEntries = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (entries[key] && (entries[key].blocks?.some(b => b.piece || b.note) || entries[key].recordings?.length)) {
        monthEntries.push({ key, d });
      }
    }

    if (monthEntries.length > 0) {
      const list = document.createElement('div');
      list.className = 'ycal-entries';
      monthEntries.forEach(({ key, d }) => {
        const entry = entries[key];
        const date = new Date(key + 'T00:00:00');
        const pieces = entry.blocks?.filter(b => b.piece).map(b => b.piece) || entry.pieces || [];
        const item = document.createElement('div');
        item.className = 'ycal-entry-item';
        item.innerHTML = `
          <div class="ycal-entry-day">${d}</div>
          <div class="ycal-entry-detail">
            <div class="ycal-entry-weekday">${date.toLocaleDateString('en-US', { weekday: 'long' })}</div>
            <div class="ycal-entry-pieces">${pieces.length ? pieces.join(' · ') : entry.recordings?.length ? '🎵 Recording' : '—'}</div>
          </div>
        `;
        item.onclick = () => openDayModal(key);
        list.appendChild(item);
      });
      body.appendChild(list);
    }
  }
}


function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.getElementById(`nav-${view}`).classList.add('active');

  if (view === 'stats') renderStats();
  if (view === 'all') renderAll();
  if (view === 'journal') { renderCalendar(); loadJournalForDate(); }
  if (view === 'goals') { renderGoals(); renderMiniGoals(); }
  if (view === 'cal') { calViewYear = new Date().getFullYear(); calViewMonth = null; renderCalView(); }

  // Hide header calendar on Journal and Calendar views
  const isMobile = window.innerWidth <= 430;
  const hideCal = view === 'all' || view === 'cal' || (isMobile && (view === 'journal' || view === 'goals'));
  document.getElementById('cal-section').style.display = hideCal ? 'none' : '';
}

// ---- All Entries (Journal) ----
function openDayModal(key) {
  const entry = entries[key];
  const d = new Date(key + 'T00:00:00');
  document.getElementById('day-modal-date').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const body = document.getElementById('day-modal-body');
  body.innerHTML = '';

  // Blocks (piece + note)
  const blocks = entry.blocks?.filter(b => b.piece || b.note) || [];
  // Legacy: pieces + note
  const pieces = entry.pieces || [];
  const legacyNote = entry.note || '';

  if (blocks.length > 0) {
    blocks.forEach(b => {
      const div = document.createElement('div');
      div.className = 'day-modal-block';
      div.innerHTML = `
        ${b.piece ? `<div class="day-modal-piece">${b.piece}</div>` : ''}
        ${b.note ? `<div class="day-modal-note">${b.note}</div>` : ''}
      `;
      body.appendChild(div);
    });
  } else if (pieces.length > 0 || legacyNote) {
    const div = document.createElement('div');
    div.className = 'day-modal-block';
    div.innerHTML = `
      ${pieces.map(p => `<div class="day-modal-piece">${p}</div>`).join('')}
      ${legacyNote ? `<div class="day-modal-note">${legacyNote}</div>` : ''}
    `;
    body.appendChild(div);
  }

  if (entry.recordings?.length) {
    const recSection = document.createElement('div');
    recSection.className = 'day-modal-recordings-section';
    recSection.innerHTML = `<div class="day-modal-rec-label">Recordings</div>`;

    entry.recordings.forEach(rec => {
      const item = document.createElement('div');
      item.className = 'day-modal-rec-item';

      const icon = document.createElement('span');
      icon.textContent = '🔗';
      icon.style.cssText = 'opacity:0.45;flex-shrink:0;font-size:1rem;';

      const link = document.createElement('a');
      link.className = 'day-modal-rec-name';
      link.href = rec.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = rec.name || rec.url;
      link.style.cssText = 'color:var(--accent);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;font-size:0.8rem;';

      item.style.cssText = 'display:flex;align-items:center;gap:8px;';
      item.appendChild(icon);
      item.appendChild(link);
      recSection.appendChild(item);
    });

    body.appendChild(recSection);
  }

  if (body.children.length === 0) {
    body.innerHTML = '<div class="day-modal-empty">No details recorded.</div>';
  }

  document.getElementById('day-modal-overlay').classList.add('open');
}

function closeDayModal() {
  document.getElementById('day-modal-overlay').classList.remove('open');
  // Stop any playing audio
  document.querySelectorAll('.day-modal-play-btn').forEach(btn => btn.innerHTML = '▶');
}

function renderAll() {
  const list = document.getElementById('all-entries-list');
  list.innerHTML = '';

  const hasContent = k => {
    const e = entries[k];
    return e.blocks?.some(b => b.piece || b.note) || e.note || e.pieces?.length || e.recordings?.length;
  };

  const keys = Object.keys(entries)
    .filter(hasContent)
    .sort((a, b) => b.localeCompare(a));

  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎹</div><div>No entries yet.<br>Start logging today!</div></div>';
    return;
  }

  keys.forEach(key => {
    const entry = entries[key];
    const d = new Date(key + 'T00:00:00');
    const el = document.createElement('div');
    el.className = 'recent-entry';

    // Build piece list from blocks (new) or legacy pieces field
    const blocks = entry.blocks?.filter(b => b.piece || b.note) || [];
    const pieces = blocks.length
      ? blocks.map(b => b.piece).filter(Boolean)
      : (entry.pieces || []);
    const previewNote = blocks.length
      ? (blocks[0]?.note || '')
      : (entry.note || '');

    el.innerHTML = `
      <div class="recent-date">${d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
      ${pieces.length
        ? pieces.map((p, i) => `<div class="recent-piece-line"><span class="recent-piece-name">${p}</span>${i === pieces.length - 1 && previewNote ? `<span class="recent-piece-note"> — ${previewNote}</span>` : ''}</div>`).join('')
        : previewNote ? `<div class="recent-piece-line"><span class="recent-piece-note">${previewNote}</span></div>`
        : entry.recordings?.length ? `<div class="recent-piece-line"><span class="recent-piece-note">🎵 ${entry.recordings.length} recording(s)</span></div>` : ''
      }
    `;
    el.onclick = () => openDayModal(key);
    list.appendChild(el);
  });
}

// ---- Goals ----
let goals = [];
let miniGoals = [];

function loadGoals() {
  return getDoc(doc(db, 'users', currentUser, 'data', 'goals'))
    .then(snap => {
      goals = snap.exists() ? (snap.data().goals || []) : [];
      miniGoals = snap.exists() ? (snap.data().miniGoals || []) : [];
    })
    .catch(() => { goals = []; miniGoals = []; });
}

function saveGoals() {
  return setDoc(doc(db, 'users', currentUser, 'data', 'goals'), { goals, miniGoals })
    .catch(e => console.error('Save goals failed', e));
}

let editingBlockIndex = null;

function openBlockForm(index = null) {
  editingBlockIndex = index;
  const entry = getEntry(selectedDate);
  const data = index !== null ? (entry.blocks?.[index] || {}) : {};
  document.getElementById('block-sheet-piece').value = data.piece || '';
  document.getElementById('block-sheet-note').value = data.note || '';
  // Show/hide delete button
  const delBtn = document.getElementById('block-sheet-delete');
  if (delBtn) delBtn.style.display = index !== null ? 'block' : 'none';

  document.getElementById('block-sheet-overlay').classList.add('open');
  document.getElementById('block-sheet').classList.add('open');
  setTimeout(() => document.getElementById('block-sheet-piece').focus(), 350);
}

function closeBlockForm() {
  const sheet = document.getElementById('block-sheet');
  sheet.classList.remove('open');
  sheet.style.bottom = '';
  document.getElementById('block-sheet-overlay').classList.remove('open');
}

function saveBlockFromSheet() {
  const piece = document.getElementById('block-sheet-piece').value.trim();
  const note = document.getElementById('block-sheet-note').value.trim();
  if (!piece && !note) return;

  const saveDate = selectedDate;

  const entry = getEntry(saveDate);
  if (!entry.blocks) entry.blocks = [];
  const isNew = editingBlockIndex === null;
  if (!isNew) {
    entry.blocks[editingBlockIndex] = { piece, note, saved: true };
  } else {
    entry.blocks.push({ piece, note, saved: true });
  }
  setEntry(selectedDate, entry);
  closeBlockForm();
  renderCalendar();
  renderBlocks(entry.blocks);
  if (isNew) launchFirework();
}

function deleteBlockFromSheet() {
  if (editingBlockIndex === null) return;
  const entry = getEntry(selectedDate);
  entry.blocks.splice(editingBlockIndex, 1);
  setEntry(selectedDate, entry);
  closeBlockForm();
  renderCalendar();
  renderBlocks(entry.blocks);
}

function deleteBlockFromSheet_byIndex(index) {
  const entry = getEntry(selectedDate);
  entry.blocks.splice(index, 1);
  setEntry(selectedDate, entry);
  renderCalendar();
  renderBlocks(entry.blocks);
}

function openGoalForm() {
  document.getElementById('goal-sheet-overlay').classList.add('open');
  document.getElementById('goal-sheet').classList.add('open');
  setTimeout(() => document.getElementById('goal-input').focus(), 350);
}

function closeGoalForm() {
  const sheet = document.getElementById('goal-sheet');
  sheet.classList.remove('open');
  sheet.style.bottom = '';
  document.getElementById('goal-sheet-overlay').classList.remove('open');
  document.getElementById('goal-date-warning').textContent = '';
}

function checkGoalDateConflict() {
  const date = document.getElementById('goal-date').value;
  const warn = document.getElementById('goal-date-warning');
  if (date && goals.some(g => g.date === date)) {
    warn.textContent = 'A goal already exists for this date.';
  } else {
    warn.textContent = '';
  }
}

function selectGoalColor(btn) {
  document.querySelectorAll('.goal-color-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function addGoal() {
  const text = document.getElementById('goal-input').value.trim();
  const date = document.getElementById('goal-date').value;
  if (!text) return;
  if (date && goals.some(g => g.date === date)) {
    document.getElementById('goal-date-warning').textContent = 'A goal already exists for this date.';
    return;
  }
  const colorBtn = document.querySelector('.goal-color-btn.selected');
  const color = colorBtn ? colorBtn.dataset.color : '#b89a6a';
  goals.push({ id: Date.now(), text, date, done: false, color });
  saveGoals();
  document.getElementById('goal-input').value = '';
  document.getElementById('goal-date').value = '';
  // Reset color picker to gold
  document.querySelectorAll('.goal-color-btn').forEach((b,i) => b.classList.toggle('selected', i===0));
  closeGoalForm();
  renderCalendar();
  if (typeof calViewMonth !== 'undefined') renderCalView();
  renderGoals();
  renderMiniGoals();
}

function openMiniGoalForm() {
  document.getElementById('mini-goal-sheet-overlay').classList.add('open');
  document.getElementById('mini-goal-sheet').classList.add('open');
  setTimeout(() => document.getElementById('mini-goal-input').focus(), 350);
}

function closeMiniGoalForm() {
  document.getElementById('mini-goal-sheet-overlay').classList.remove('open');
  document.getElementById('mini-goal-sheet').classList.remove('open');
  document.getElementById('mini-goal-input').value = '';
  document.getElementById('mini-goal-date').value = '';
}

function addMiniGoal() {
  const text = document.getElementById('mini-goal-input').value.trim();
  const date = document.getElementById('mini-goal-date').value;
  if (!text || !date) return;
  miniGoals.push({ id: Date.now(), text, date });
  saveGoals();
  closeMiniGoalForm();
  renderCalendar();
  if (typeof calViewMonth !== 'undefined') renderCalView();
  renderMiniGoals();
}

function toggleMiniGoal(id) {
  const m = miniGoals.find(m => m.id === id);
  if (!m) return;
  if (!m.done) launchNotesBurst();
  m.done = !m.done;
  saveGoals();
  renderCalendar();
  if (typeof calViewMonth !== 'undefined') renderCalView();
  renderMiniGoals();
}

function deleteMiniGoal(id) {
  miniGoals = miniGoals.filter(m => m.id !== id);
  saveGoals();
  renderCalendar();
  if (typeof calViewMonth !== 'undefined') renderCalView();
  renderMiniGoals();
}

function renderMiniGoals() {
  const list = document.getElementById('mini-goals-list');
  if (!list) return;
  list.innerHTML = '';
  if (miniGoals.length === 0) return;

  const header = document.createElement('div');
  header.className = 'section-label';
  header.style.cssText = 'margin-bottom:8px;margin-top:16px;';
  header.textContent = 'Mini Goals';
  list.appendChild(header);

  const sorted = [...miniGoals].sort((a,b) => a.date.localeCompare(b.date));
  sorted.forEach(m => {
    const today = new Date().toISOString().split('T')[0];
    const isOverdue = m.date && m.date < today && !m.done;

    // Same wrapper structure as goal-item-wrap
    const wrap = document.createElement('div');
    wrap.className = 'goal-item-wrap';

    const item = document.createElement('div');
    item.className = 'goal-item' + (m.done ? ' done' : '');

    // Same check button as goals
    const circleBtn = document.createElement('button');
    circleBtn.className = 'goal-check' + (m.done ? ' checked' : '');
    circleBtn.textContent = m.done ? '✓' : '';
    circleBtn.addEventListener('click', () => toggleMiniGoal(m.id));

    const body = document.createElement('div');
    body.className = 'goal-body';

    const txt = document.createElement('div');
    txt.className = 'goal-text' + (m.done ? ' done' : '');
    txt.textContent = m.text;
    body.appendChild(txt);

    const d = new Date(m.date + 'T00:00:00');
    const due = document.createElement('div');
    due.className = 'goal-due' + (isOverdue ? ' overdue' : '');
    due.textContent = (isOverdue ? 'Overdue · ' : 'By · ') + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    body.appendChild(due);

    item.appendChild(circleBtn);
    item.appendChild(body);

    // Dots menu — same as goals
    const dotsBtn = document.createElement('button');
    dotsBtn.className = 'item-dots-btn';
    dotsBtn.style.display = 'flex';
    dotsBtn.textContent = '⋯';
    dotsBtn.title = 'Options';

    const menu = document.createElement('div');
    menu.className = 'dots-menu';

    const delBtn = document.createElement('button');
    delBtn.className = 'dots-menu-item danger';
    delBtn.textContent = 'Delete';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.remove('open');
      deleteMiniGoal(m.id);
    });
    menu.appendChild(delBtn);
    document.body.appendChild(menu);

    dotsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('open');
      closeAllDotsMenus(null);
      if (!isOpen) {
        const r = dotsBtn.getBoundingClientRect();
        menu.style.top = (r.bottom + 4) + 'px';
        menu.style.right = (window.innerWidth - r.right) + 'px';
        menu.classList.add('open');
      }
    });

    item.appendChild(dotsBtn);
    wrap.appendChild(item);
    list.appendChild(wrap);
  });
}

function toggleGoal(id) {
  const g = goals.find(g => g.id === id);
  if (g) { g.done = !g.done; saveGoals(); renderCalendar(); if (typeof calViewMonth !== 'undefined') renderCalView(); renderGoals(); renderMiniGoals(); }
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  saveGoals();
  renderCalendar();
  if (typeof calViewMonth !== 'undefined') renderCalView();
  renderGoals();
  renderMiniGoals();
}

function openDatePicker() {
  if (window.matchMedia('(pointer: fine)').matches) return;
  const input = document.getElementById('dp-date-input');
  input.value = dateKey(selectedDate);
  try { input.showPicker(); } catch(e) { input.click(); }
}

function closeDatePicker() {} // no-op, picker closes itself

function applyDatePicker() {
  const val = document.getElementById('dp-date-input').value;
  if (!val) { closeDatePicker(); return; }
  const [y, m, d] = val.split('-').map(Number);
  selectedDate = new Date(y, m - 1, d);
  closeDatePicker();
  renderCalendar();
  loadJournalForDate();
}

function launchNotesBurst() {
  const wrap = document.createElement('div');
  wrap.className = 'mini-celebrate-wrap';
  const img = document.createElement('img');
  img.src = 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExZXpndndub2ZvOGlrN3F6OXNueWUydGowZDFwM3ZxeHFxMXdteHM3YiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ePaw7nwYmSI1t389Sy/giphy.gif';
  img.alt = '';
  wrap.appendChild(img);
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 2700);
}

function launchFirework() {
  const wrap = document.createElement('div');
  wrap.className = 'firework-wrap';
  document.body.appendChild(wrap);

  const colors = ['#b89a6a','#f1c40f','#e74c3c','#3498db','#2ecc71','#9b59b6','#fff','#fd79a8'];
  const bursts = 3;

  for (let b = 0; b < bursts; b++) {
    setTimeout(() => {
      // Each burst originates from a random-ish center point on screen
      const cx = window.innerWidth  * (0.3 + Math.random() * 0.4);
      const cy = window.innerHeight * (0.2 + Math.random() * 0.45);
      const count = 28 + Math.floor(Math.random() * 16);

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'firework-particle';

        const angle = (i / count) * 2 * Math.PI;
        const dist  = 60 + Math.random() * 90;
        const dx    = Math.cos(angle) * dist;
        const dy    = Math.sin(angle) * dist;
        const size  = 4 + Math.random() * 5;
        const dur   = 0.55 + Math.random() * 0.4;

        p.style.cssText = `
          left: ${cx}px; top: ${cy}px;
          width: ${size}px; height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          --dx: ${dx}px; --dy: ${dy}px;
          animation-duration: ${dur}s;
          animation-delay: ${b * 0.18}s;
          box-shadow: 0 0 ${size}px ${colors[Math.floor(Math.random() * colors.length)]};
        `;
        wrap.appendChild(p);
      }
    }, b * 180);
  }

  setTimeout(() => wrap.remove(), 1600);
}

function launchConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  document.body.appendChild(wrap);
  const colors = ['#b89a6a','#2c2c2c','#c0392b','#f1c40f','#27ae60','#2980b9','#8e44ad'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (6 + Math.random() * 6) + 'px';
    p.style.height = (6 + Math.random() * 10) + 'px';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.remove(), 3500);
}

// Close any open dots menus except the given one
function closeAllDotsMenus(except) {
  document.querySelectorAll('.dots-menu.open').forEach(m => {
    if (m !== except) m.classList.remove('open');
  });
}
// Global click closes all menus (fires after stopPropagation on btn is handled)
document.addEventListener('click', (e) => {
  if (!e.target.closest('.item-dots-btn')) closeAllDotsMenus(null);
});

function renderGoals() {
  const list = document.getElementById('goals-list');
  list.innerHTML = '';

  const sorted = [...goals].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><div>No goals yet.<br>Add one above!</div></div>';
    return;
  }

  sorted.forEach(g => {
    const today = new Date().toISOString().split('T')[0];
    const isOverdue = g.date && g.date < today && !g.done;

    // Wrapper
    const wrap = document.createElement('div');
    wrap.className = 'goal-item-wrap';

    // Red delete background
    const bg = document.createElement('div');
    bg.className = 'goal-item-delete-bg';
    bg.textContent = 'Delete';

    // Goal item
    const item = document.createElement('div');
    item.className = 'goal-item' + (g.done ? ' done' : '');

    const check = document.createElement('button');
    check.className = 'goal-check' + (g.done ? ' checked' : '');
    check.textContent = g.done ? '✓' : '';
    check.onclick = () => {
      if (!g.done) launchConfetti();
      toggleGoal(g.id);
    };

    const body = document.createElement('div');
    body.className = 'goal-body';

    const text = document.createElement('div');
    text.className = 'goal-text' + (g.done ? ' done' : '');
    text.textContent = g.text;
    body.appendChild(text);

    if (g.date) {
      const due = document.createElement('div');
      due.className = 'goal-due' + (isOverdue ? ' overdue' : '');
      const d = new Date(g.date + 'T00:00:00');
      due.textContent = (isOverdue ? 'Overdue · ' : 'By · ') + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      body.appendChild(due);
    }

    item.appendChild(check);
    item.appendChild(body);

    // ⋯ button (PC)
    const dotsBtn = document.createElement('button');
    dotsBtn.className = 'item-dots-btn';
    dotsBtn.textContent = '⋯';
    dotsBtn.title = 'Options';

    const menu = document.createElement('div');
    menu.className = 'dots-menu';

    const delBtn = document.createElement('button');
    delBtn.className = 'dots-menu-item danger';
    delBtn.textContent = 'Delete';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.remove('open');
      wrap.style.transition = 'max-height 0.3s ease, opacity 0.3s ease, margin-bottom 0.3s ease';
      wrap.style.maxHeight = wrap.offsetHeight + 'px';
      setTimeout(() => { wrap.style.maxHeight = '0'; wrap.style.opacity = '0'; wrap.style.marginBottom = '0'; }, 10);
      setTimeout(() => deleteGoal(g.id), 320);
    });
    menu.appendChild(delBtn);
    document.body.appendChild(menu);

    dotsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('open');
      closeAllDotsMenus(null);
      if (!isOpen) {
        const r = dotsBtn.getBoundingClientRect();
        menu.style.top = (r.bottom + 4) + 'px';
        menu.style.right = (window.innerWidth - r.right) + 'px';
        menu.classList.add('open');
      }
    });

    item.appendChild(dotsBtn);
    wrap.appendChild(bg);
    wrap.appendChild(item);
    list.appendChild(wrap);

    // Swipe logic (touch only)
    let startX = 0, currentX = 0, swiping = false;
    const DELETE_THRESHOLD = 80;
    const DONE_THRESHOLD = 80;

    function onStart(e) {
      if (e.type === 'mousedown' && window.matchMedia('(pointer: fine)').matches) return;
      startX = e.touches ? e.touches[0].clientX : e.clientX;
      currentX = 0;
      swiping = true;
      item.classList.add('swiping');
    }
    function onMove(e) {
      if (!swiping) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      currentX = x - startX;
      item.style.transform = `translateX(${currentX}px)`;
      if (currentX < 0) {
        bg.style.background = '#c0392b';
        bg.textContent = 'Delete';
        bg.style.left = 'auto'; bg.style.right = '0';
      } else {
        bg.style.background = 'var(--gold)';
        bg.textContent = '★ Done';
        bg.style.right = 'auto'; bg.style.left = '0';
      }
    }
    function onEnd() {
      if (!swiping) return;
      swiping = false;
      item.classList.remove('swiping');
      if (currentX <= -DELETE_THRESHOLD) {
        item.style.transition = 'transform 0.2s ease';
        item.style.transform = `translateX(-100%)`;
        wrap.style.transition = 'max-height 0.3s ease, opacity 0.3s ease, margin-bottom 0.3s ease';
        wrap.style.maxHeight = wrap.offsetHeight + 'px';
        setTimeout(() => { wrap.style.maxHeight = '0'; wrap.style.opacity = '0'; wrap.style.marginBottom = '0'; }, 150);
        setTimeout(() => deleteGoal(g.id), 400);
      } else if (currentX >= DONE_THRESHOLD && !g.done) {
        item.style.transition = 'transform 0.2s ease';
        item.style.transform = `translateX(100%)`;
        launchConfetti();
        setTimeout(() => { toggleGoal(g.id); }, 2800);
      } else {
        item.style.transition = 'transform 0.2s ease';
        item.style.transform = 'translateX(0)';
      }
    }

    item.addEventListener('touchstart', onStart, { passive: true });
    item.addEventListener('touchmove', onMove, { passive: true });
    item.addEventListener('touchend', onEnd);
  });
}

// ---- iOS keyboard: shift sheets above keyboard ----
function setupKeyboardShift() {
  if (!window.visualViewport) return;
  window.visualViewport.addEventListener('resize', () => {
    const sheets = document.querySelectorAll('.goal-sheet.open');
    const keyboardHeight = window.innerHeight - window.visualViewport.height;
    sheets.forEach(sheet => {
      sheet.style.bottom = keyboardHeight > 50 ? keyboardHeight + 'px' : '';
    });
  });
}
