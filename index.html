<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4df;
    --text: #1a1a1a;
    --muted: #999;
    --accent: #2c2c2c;
    --soft: #f3f0ec;
    --gold: #b89a6a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    color: var(--text);
    overflow: hidden;
  }

  /* ---- App Shell ---- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
    visibility: hidden;
  }

  /* ---- Header ---- */
  .header {
    padding: 52px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .today-btn {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    transition: all 0.2s;
  }
  .today-btn:hover { color: var(--text); border-color: var(--text); }

  /* ---- Calendar ---- */
  .calendar {
    margin-bottom: 4px;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  .cal-arrow {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .cal-arrow:hover { color: var(--text); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-label {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.15s;
    position: relative;
    color: var(--text);
  }

  .cal-day:hover { background: var(--soft); }
  .cal-day.empty { cursor: default; }
  .cal-day.today { font-weight: 500; }
  .cal-day.selected { background: var(--accent); color: #fff; }
  .cal-day.selected:hover { background: var(--accent); }

  .cal-day-num {
    position: relative;
    z-index: 1;
  }

  .cal-day.has-entry::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
  }
  .cal-day.selected.has-entry::after { background: rgba(255,255,255,0.6); }

  .cal-day.has-goal::before {
    content: '★';
    color: var(--star-color, #b89a6a);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.2rem;
    opacity: 1;
    line-height: 1;
    pointer-events: none;
    z-index: 0;
  }
  .cal-day.has-goal { z-index: 0; }
  .cal-day.selected.has-goal::before { color: rgba(255,255,255,0.6); }

  .cal-day.has-goal-done::before {
    content: '★';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.2rem;
    color: #ccc;
    opacity: 1;
    line-height: 1;
    pointer-events: none;
    z-index: 0;
  }
  .cal-day.has-goal-done { z-index: 0; }
  .cal-day.selected.has-goal-done::before { color: rgba(255,255,255,0.4); }

  /* Handwritten circle for mini-goal days */
  .cal-day.has-mini-goal {
    position: relative;
  }
  .cal-day.has-mini-goal::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 54,8 C 70,6 88,12 93,28 C 98,44 95,65 85,76 C 74,88 55,94 38,91 C 20,88 7,76 5,60 C 3,44 10,24 24,15 C 34,9 44,9 54,10 C 60,11 64,13 62,14' fill='none' stroke='%23000000' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-size: 100% 100%;
    z-index: 1;
  }
  /* Keep existing entry dot on top */
  .cal-day.has-mini-goal.has-entry::after { z-index: 0; }

  /* Done mini goal — grey circle */
  .cal-day.has-mini-goal-done {
    position: relative;
  }
  .cal-day.has-mini-goal-done::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 54,8 C 70,6 88,12 93,28 C 98,44 95,65 85,76 C 74,88 55,94 38,91 C 20,88 7,76 5,60 C 3,44 10,24 24,15 C 34,9 44,9 54,10 C 60,11 64,13 62,14' fill='none' stroke='%23aaaaaa' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-size: 100% 100%;
    z-index: 1;
  }

  .cal-day.other-month { color: var(--border); cursor: default; }

  /* ---- Scrollable Content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 100px;
    -webkit-overflow-scrolling: touch;
  }

  .selected-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    color: var(--text);
  }

  /* ---- Note Section ---- */
  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;

  /* ---- Stats View ---- */
  .view { display: none; }

  .stats-header {

  .recent-piece-line { font-size: 0.88rem; line-height: 1.6; }

  /* ---- Goals ---- */


  .goal-color-picker {
    display: flex;
    gap: 10px;
    margin-bottom: 4px;
  }
  .goal-color-btn {
    width: 28px;
    height: 28px;

    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    padding: 0;
    outline: none;
  }
  .goal-color-btn:hover { transform: scale(1.15); }
  .goal-color-btn.selected {
    border-color: var(--text);
    transform: scale(1.18);
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--text);
  }

  .goal-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 2px;
    margin-bottom: 4px;
  }

  .goal-date-input {
    width: 100%;
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .goal-date-input:focus { border-color: var(--accent); }

  .goal-item-wrap {
    position: relative;
    margin-bottom: 8px;
    overflow: hidden;
    border-radius: 2px;
  }
  .goal-item-delete-bg {
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .goal-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
    transform: translateX(0);
    transition: transform 0.2s ease;
    will-change: transform;
    touch-action: pan-y;
    cursor: grab;
  }
  .goal-item.done { opacity: 0.5; }
  .goal-item.swiping { transition: none; }

  .goal-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: none;
  }
  .goal-check:hover { border-color: var(--accent); }
  .goal-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 0.6rem; }

  .goal-body { flex: 1; min-width: 0; }
  .goal-text { font-size: 0.85rem; line-height: 1.5; margin-bottom: 4px; }
  .goal-text.done { text-decoration: line-through; color: var(--muted); }
  .goal-due { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
  .goal-due.overdue { color: #c0392b; }

  .goal-delete { display: none; }

  /* ---- Date Picker Overlay ---- */
  .selected-date::after {
    content: ' ▾';
    font-size: 1.4rem;
    opacity: 0.55;
    vertical-align: middle;
  }
  @media (pointer: fine) {
    .selected-date::after { display: none; }
    .selected-date { cursor: default !important; }
  }


  /* ---- Mini Goal celebration: confetti cannon GIF ---- */
  .mini-celebrate-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: celebrateFadeOut 0.4s ease-in 2.2s forwards;
  }
  .mini-celebrate-wrap img {
    width: min(320px, 80vw);
    height: auto;
  }
  @keyframes celebrateFadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* ---- Fireworks ---- */
  .firework-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .firework-particle {
    position: absolute;
    border-radius: 50%;
    animation: fireworkFly linear forwards;
  }
  @keyframes fireworkFly {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* ---- Confetti ---- */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    top: -12px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    opacity: 0.9;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0)      rotateZ(0deg)   rotateX(0deg);   opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh)  rotateZ(720deg) rotateX(360deg); opacity: 0; }
  }

  .add-block-fab {
    display: block;
    width: 100%;
    margin-top: 10px;
    margin-bottom: 4px;
    padding: 11px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .add-block-fab:hover { border-color: var(--accent); color: var(--accent); }

  /* ---- Year Calendar View ---- */
  .year-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 12px;
    flex-shrink: 0;
  }
  .year-cal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text);
  }
  .year-cal-arrow {
    background: none;
    border: none;
    font-size: 1.4rem;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    line-height: 1;
  }

  /* Year grid - 12 months */
  #year-cal-body.year-mode {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px 8px;
    padding: 4px 16px 32px;
    overflow-y: auto;
  }
  .ycal-month-card {
    cursor: pointer;
    border-radius: 4px;
    padding: 8px 6px;
    transition: background 0.15s;
  }
  .ycal-month-card:hover { background: var(--border); }
  .ycal-month-card.current-month { background: rgba(184,154,106,0.12); }
  .ycal-month-name {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 5px;
  }
  .ycal-month-card.current-month .ycal-month-name { color: var(--accent); }
  .ycal-mini-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }
  .ycal-mini-cell {
    font-family: 'Jost', sans-serif;
    font-size: 0.46rem;
    font-weight: 300;
    text-align: center;
    padding: 1.5px 0;
    color: var(--text);
    line-height: 1.2;
    border-radius: 50%;
    position: relative;
  }
  .ycal-mini-cell.label { color: var(--muted); font-size: 0.4rem; }
  .ycal-mini-cell.today { background: var(--text); color: var(--bg); border-radius: 50%; }
  .ycal-mini-cell.has-entry::after {
    content: '';
    display: block;
    width: 2px;
    height: 2px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 auto;
  }
  .ycal-mini-cell.has-goal { color: #b89a6a; font-weight: 500; }
  .ycal-mini-cell.has-goal::before { content: '★'; position: absolute; font-size: 0.45rem; top: 0; right: 0; color: #b89a6a; }
  .ycal-mini-cell.has-goal { position: relative; }
  .ycal-mini-cell.has-goal-done::before { content: '★'; position: absolute; font-size: 0.45rem; top: 0; right: 0; color: #ccc; }
  .ycal-mini-cell.has-goal-done { position: relative; }

  /* Month drill-down mode */
  #year-cal-body.month-mode {
    padding: 0 12px 32px;
    overflow-y: auto;
  }
  .ycal-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 0 16px;
  }
  .ycal-full-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .ycal-full-cell {
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    text-align: center;
    padding: 8px 2px;
    color: var(--text);
    border-radius: 4px;
    cursor: default;
    position: relative;
  }
  .ycal-full-cell.label {
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 6px;
    cursor: default;
  }
  .ycal-full-cell.other { color: var(--border); }
  .ycal-full-cell.today {
    background: var(--text);
    color: var(--bg);
    border-radius: 50%;
    font-weight: 500;
  }
  .ycal-full-cell.has-entry { cursor: pointer; }
  .ycal-full-cell.has-entry .ycal-dot {
    display: block;
    width: 3px;
    height: 3px;
    background: var(--accent);
    border-radius: 50%;
    margin: 2px auto 0;
  }
  .ycal-full-cell.has-entry:not(.today):hover { background: var(--border); border-radius: 4px; }
  .ycal-full-cell.has-goal::before {
    content: '★';
    position: absolute;
    top: 1px; right: 3px;
    font-size: 0.6rem;
    color: #b89a6a;
    line-height: 1;
  }
  .ycal-full-cell.has-goal { cursor: pointer; }
  .ycal-full-cell.has-goal-done::before {
    content: '★';
    position: absolute;
    top: 1px; right: 3px;
    font-size: 0.6rem;
    color: #ccc;
    line-height: 1;
  }

  /* Entries list below month grid */
  .ycal-entries {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .ycal-entry-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .ycal-entry-item:last-child { border-bottom: none; }
  .ycal-entry-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--muted);
    min-width: 28px;
    text-align: center;
    line-height: 1;
  }
  .ycal-entry-detail { flex: 1; min-width: 0; }
  .ycal-entry-weekday {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .ycal-entry-pieces {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---- Add Goal Button & Sheet ---- */
  .add-goal-fab {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .add-goal-fab:hover { border-color: var(--accent); color: var(--accent); }

  .goal-sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 800;
  }
  .goal-sheet-overlay.open { display: block; }

  .goal-sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--bg);
    border-radius: 12px 12px 0 0;
    padding: 16px 24px 32px;
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
    z-index: 900;
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 96dvh;
    min-height: 70dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .goal-sheet.open { transform: translateX(-50%) translateY(0); }

  .goal-sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  /* ---- Login Animation ---- */
  .year-anim {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1500;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .year-anim.active { display: flex; }

  /* Scaler: the whole year grid sits inside this; JS scales it up toward
     the current-month cell to create the zoom-in effect */
  #ya-scaler {
    width: 300px;
    transition: transform 1.8s cubic-bezier(0.4,0,0.15,1),
                opacity  0.6s ease 1.2s;
  }

  /* 3-column year grid */
  #ya-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #ya-grid.show { opacity: 1; }

  /* Each small month card */
  .ya-month {
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 5px 7px;
    background: var(--surface);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
  }
  .ya-month.current {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 2px 10px rgba(184,154,106,0.25);
  }

  .ya-month-name {
    font-family: 'Jost', sans-serif;
    font-size: 0.42rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 4px;
  }
  .ya-month.current .ya-month-name { color: var(--accent); }

  .ya-mini-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0px;
  }
  .ya-mini-cell {
    font-family: 'Jost', sans-serif;
    font-size: 0.38rem;
    font-weight: 300;
    text-align: center;
    padding: 1px 0;
    line-height: 1.1;
    color: var(--text);
    border-radius: 50%;
  }
  .ya-mini-cell.lbl  { color: var(--muted); font-size: 0.34rem; }
  .ya-mini-cell.emp  { visibility: hidden; }
  .ya-mini-cell.tod  { background: var(--text); color: var(--bg); border-radius: 50%; }
  .ya-mini-cell.cur  { background: rgba(184,154,106,0.18); border-radius: 2px; }

  /* Full month page that blooms over the top after the zoom */
  #ya-fullpage {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease;
  }
  #ya-fullpage.show { opacity: 1; }
  #ya-fullpage-inner {
    width: 300px;
  }
  .ya-fp-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-align: center;
    color: var(--text);
    margin-bottom: 2px;
  }
  .ya-fp-year {
    font-family: 'Jost', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
  }
  .ya-fp-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 12px;
  }
  .ya-fp-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .ya-fp-cell {
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    text-align: center;
    padding: 5px 0;
    line-height: 1.2;
    color: var(--text);
    border-radius: 50%;
  }
  .ya-fp-cell.lbl { font-size: 0.6rem; color: var(--muted); padding-bottom: 8px; }
  .ya-fp-cell.emp { visibility: hidden; }
  .ya-fp-cell.tod { background: var(--text); color: var(--bg); font-weight: 500; }
  .ya-fp-cell.wkd { color: var(--muted); }

  /* ---- Loading Screen ---- */
    display: flex;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 3000;
    align-items: center;
    justify-content: center;
  }
  .loading-screen.hidden { display: none; }
  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Login Screen ---- */
  .login-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .login-screen.visible { display: flex; }

  .login-paws {
    position: absolute;
    top: 0;
    right: 0;
    width: 220px;
    height: 280px;
    pointer-events: none;
  }
  .login-box {
    width: 100%;
    max-width: 340px;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }
  .login-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Jost', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-error {
    font-size: 0.75rem;
    color: #c0392b;
    min-height: 18px;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .login-hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 14px;
    text-align: center;
    line-height: 1.5;
  }

  /* ---- Logout button ---- */
  .logout-btn {
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.15rem 0.5rem;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .logout-btn:hover { color: var(--text); border-color: var(--text); }

  /* ---- Day Detail Modal ---- */
  .day-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
  }
  .day-modal-overlay.open {
    display: flex;
  }
  .day-modal {
    position: relative;
    width: 100%;
    max-width: 430px;
    max-height: 85dvh;
    overflow-y: auto;
    border-radius: 8px 8px 0 0;
    padding: 28px 28px 48px;
    background: var(--bg);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .day-modal-close {
    position: absolute;
    top: 14px;
    right: 18px;
    font-size: 1.4rem;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
  }
  .day-modal-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.04em;
  }
  .day-modal-block {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px dashed var(--border);
  }
  .day-modal-block:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .day-modal-piece {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 6px;
  }
  .day-modal-note {
    font-family: 'Jost', sans-serif;
    font-size: 0.84rem;
    font-weight: 300;
    color: #555;
    line-height: 2;
    white-space: pre-wrap;
  }
  .day-modal-recordings {
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .day-modal-recordings-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
  }
  .day-modal-rec-label {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .day-modal-rec-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .day-modal-play-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.65rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .day-modal-play-btn:hover { background: var(--text); color: var(--bg); }
  .day-modal-rec-info { flex: 1; min-width: 0; }
  .day-modal-rec-name {
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }
  .day-modal-rec-progress {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .day-modal-rec-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.1s linear;
  }

  .day-modal-empty {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
  }

</style>
</head>
<body>
<div class="app">

  <!-- Header + Calendar -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">Practice Journal</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="login-username-label" id="header-username" style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);"></span>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>
    <div class="calendar" id="cal-section">
      <div class="cal-nav">
        <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-arrow" onclick="changeMonth(1)">›</button>
      </div>
      <div style="text-align:right;margin-bottom:4px;">
        <button class="today-btn" onclick="goToToday()">Today</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="content">

    <!-- Journal View -->
    <div class="view active" id="view-journal">
      <div class="selected-date" id="selected-date-label" onclick="openDatePicker()" style="cursor:pointer;" title="Change date"></div>
      <button class="add-block-fab" onclick="openBlockForm()">+ Add</button>

      <div id="blocks-list"></div>

      <div class="section-gap">
        <div class="section-label">Recordings</div>
        <div class="rec-link-row">
          <input type="url" class="login-input" id="rec-link-input" placeholder="Paste a link (YouTube, SoundCloud, Drive…)" autocomplete="off" inputmode="url">
          <button class="rec-link-add-btn" onclick="addRecordingLink()">Add</button>
        </div>
        <div class="recordings-list" id="recordings-list"></div>
      </div>
    </div>

    <!-- Block Form Sheet -->
    <div class="goal-sheet-overlay" id="block-sheet-overlay" onclick="closeBlockForm()"></div>
    <div class="goal-sheet" id="block-sheet">
      <div class="goal-sheet-handle"></div>
      <div class="section-label" style="margin-bottom:6px;">Piece</div>
      <input type="text" class="login-input" id="block-sheet-piece" placeholder="e.g. Chopin Ballade No. 1..." autocomplete="off">
      <div class="section-label" style="margin-top:16px; margin-bottom:6px;">Practice Notes</div>
      <textarea class="note-area" id="block-sheet-note" placeholder="What did you work on? Techniques, breakthroughs..." style="min-height:60px;"></textarea>
      <div id="block-sheet-actions" style="display:flex;gap:8px;margin-top:12px;">
        <button id="block-sheet-delete" onclick="deleteBlockFromSheet()" style="display:none;flex:1;padding:11px;background:none;border:1px solid #e0d0d0;color:#c0392b;font-family:'Jost',sans-serif;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;">Remove</button>
        <button class="save-btn" onclick="saveBlockFromSheet()" style="flex:1;margin-top:0;">Save</button>
      </div>
    </div>

    <!-- Date Picker Overlay (mobile date switching) -->
    <!-- Hidden date input for mobile date switching -->
    <input type="date" id="dp-date-input" style="position:fixed;opacity:0;pointer-events:none;top:0;left:0;width:0;height:0;" onchange="applyDatePicker()">

    <!-- This Week View -->
    <div class="view" id="view-stats">
      <div class="stats-header">This Week</div>
      <div id="week-list"></div>
    </div>

    <!-- Journal View (all entries) -->
    <div class="view" id="view-all">
      <div class="stats-header">Journal</div>
      <div id="all-entries-list"></div>
    </div>

    <!-- Goals View -->
    <div class="view" id="view-goals">
      <div class="stats-header">Goals</div>
      <div id="goals-list"></div>
      <div style="display:flex;gap:8px;padding:0 0 12px;">
        <button class="add-goal-fab" onclick="openGoalForm()" style="flex:1;">+ Add a Goal</button>
        <button class="add-goal-fab" onclick="openMiniGoalForm()" style="flex:1;font-size:0.68rem;">+ Add a Mini Goal</button>
      </div>
      <div id="mini-goals-list"></div>
    </div>

    <!-- Calendar View -->
    <div class="view" id="view-cal">
      <div class="year-cal-header">
        <button class="year-cal-arrow" onclick="changeYearCal(-1)">‹</button>
        <div class="year-cal-title" id="year-cal-title"></div>
        <button class="year-cal-arrow" onclick="changeYearCal(1)">›</button>
      </div>
      <div class="year-cal-body" id="year-cal-body"></div>
    </div>

    <!-- Goal Form Sheet -->
    <div class="goal-sheet-overlay" id="goal-sheet-overlay" onclick="closeGoalForm()"></div>
    <div class="goal-sheet" id="goal-sheet">
      <div class="goal-sheet-handle"></div>
      <div class="section-label" style="margin-bottom:8px;">Target Date</div>
      <input type="date" id="goal-date" class="goal-date-input" style="margin-bottom:8px;" onchange="checkGoalDateConflict()">
      <div id="goal-date-warning" style="color:#c0392b;font-size:0.78rem;margin-bottom:10px;min-height:1em;"></div>
      <div class="section-label" style="margin-bottom:8px;">Star Color</div>
      <div class="goal-color-picker" id="goal-color-picker">
        <button class="goal-color-btn selected" data-color="#b89a6a" style="background:#b89a6a;" title="Gold" onclick="selectGoalColor(this)"></button>
        <button class="goal-color-btn" data-color="#e74c3c" style="background:#e74c3c;" title="Red" onclick="selectGoalColor(this)"></button>
        <button class="goal-color-btn" data-color="#3498db" style="background:#3498db;" title="Blue" onclick="selectGoalColor(this)"></button>
        <button class="goal-color-btn" data-color="#2ecc71" style="background:#2ecc71;" title="Green" onclick="selectGoalColor(this)"></button>
        <button class="goal-color-btn" data-color="#9b59b6" style="background:#9b59b6;" title="Purple" onclick="selectGoalColor(this)"></button>
      </div>
      <div class="section-label" style="margin-bottom:8px;margin-top:16px;">Goal</div>
      <textarea class="note-area" id="goal-input" placeholder="e.g. Learn the Chopin Ballade No.1, perfect the Coda section..." style="min-height:60px;"></textarea>
      <div id="goal-date-error" style="color:#c0392b;font-size:0.78rem;margin-top:8px;display:none;"></div>
      <button class="save-btn" onclick="addGoal()" style="margin-top:12px;">Add Goal</button>
    </div>

  </div>

    <!-- Mini Goal Form Sheet -->
    <div class="goal-sheet-overlay" id="mini-goal-sheet-overlay" onclick="closeMiniGoalForm()"></div>
    <div class="goal-sheet" id="mini-goal-sheet">
      <div class="goal-sheet-handle"></div>
      <div class="section-label" style="margin-bottom:8px;">Date</div>
      <input type="date" id="mini-goal-date" class="goal-date-input" style="margin-bottom:16px;">
      <div class="section-label" style="margin-bottom:8px;">Mini Goal</div>
      <input type="text" class="login-input" id="mini-goal-input" placeholder="e.g. Run through measures 32–48..." autocomplete="off">
      <button class="save-btn" onclick="addMiniGoal()" style="margin-top:12px;">Add Mini Goal</button>
    </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item" id="nav-cal" onclick="switchView('cal')">
      <div class="nav-icon">🗓</div>
      <div class="nav-label">Calendar</div>
    </button>
    <button class="nav-item active" id="nav-journal" onclick="switchView('journal')">
      <div class="nav-icon">✏️</div>
      <div class="nav-label">Log</div>
    </button>
    <button class="nav-item" id="nav-all" onclick="switchView('all')">
      <div class="nav-icon">📖</div>
      <div class="nav-label">Journal</div>
    </button>
    <button class="nav-item" id="nav-goals" onclick="switchView('goals')">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Goals</div>
    </button>
  </div>
</div>

<!-- Login Screen -->
<div class="login-screen" id="login-screen">

  <!-- Cat paw prints background -->
  <svg class="login-paws" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- Paw 1 (top right, larger) -->
    <g transform="translate(140,30) rotate(-20)" opacity="0.13">
      <ellipse cx="0" cy="0" rx="13" ry="16" fill="var(--accent)"/>
      <ellipse cx="-14" cy="-14" rx="6" ry="7.5" fill="var(--accent)"/>
      <ellipse cx="-5" cy="-20" rx="6" ry="7.5" fill="var(--accent)"/>
      <ellipse cx="7" cy="-21" rx="6" ry="7.5" fill="var(--accent)"/>
      <ellipse cx="16" cy="-14" rx="5.5" ry="7" fill="var(--accent)"/>
    </g>
    <!-- Paw 2 (stepped left and down) -->
    <g transform="translate(95,85) rotate(15)" opacity="0.10">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="var(--accent)"/>
      <ellipse cx="-12" cy="-12" rx="5" ry="6.5" fill="var(--accent)"/>
      <ellipse cx="-4" cy="-17" rx="5" ry="6.5" fill="var(--accent)"/>
      <ellipse cx="6" cy="-18" rx="5" ry="6.5" fill="var(--accent)"/>
      <ellipse cx="14" cy="-12" rx="4.5" ry="6" fill="var(--accent)"/>
    </g>
    <!-- Paw 3 (right, lower) -->
    <g transform="translate(168,130) rotate(-10)" opacity="0.09">
      <ellipse cx="0" cy="0" rx="10" ry="13" fill="var(--accent)"/>
      <ellipse cx="-11" cy="-11" rx="4.5" ry="6" fill="var(--accent)"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

let currentUser = null;

// Hash PIN with SHA-256 before storing — never store plain text PINs
async function hashPin(pin) {
  // crypto.subtle requires HTTPS — fall back to plain pin if unavailable
  if (!crypto?.subtle) return pin;
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e) {
    return pin; // fallback: treat as plain text
  }
}

async function handleLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.querySelector('#login-screen .save-btn');
  errEl.textContent = '';

  if (!username) { errEl.textContent = 'Please enter a username.'; return; }
  if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'PIN must be exactly 4 digits.'; return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    const userRef = doc(db, 'users', username);
    const snap = await getDoc(userRef);

    const pinHash = await hashPin(pin);

    if (snap.exists()) {
      // Existing user — verify PIN hash
      const stored = snap.data().pin;
      // Support plain-text PINs (4 digits), hashed PINs (64 chars), and fallback
      const match = stored === pinHash || stored === pin;
      if (!match) {
        errEl.textContent = 'Wrong PIN. Try again.';
        btn.textContent = 'Enter'; btn.disabled = false;
        return;
      }
      // Silently upgrade legacy plain-text PIN to hash on successful login
      if (stored === pin && pinHash !== pin) {
        await setDoc(userRef, { pin: pinHash, createdAt: snap.data().createdAt });
      }
    } else {
      // New user — store hashed PIN only
      await setDoc(userRef, { pin: pinHash, createdAt: Date.now() });
    }

    currentUser = username;
    localStorage.setItem('pj_session', username);
    btn.textContent = 'Enter'; btn.disabled = false;
    showApp();
  } catch(e) {
    console.error('Login error:', e);
    errEl.textContent = 'Error: ' + (e?.message || e?.code || 'Connection failed. Check internet.');
    btn.textContent = 'Enter'; btn.disabled = false;
  }
}

}

function playYearAnimation(onDone) {
  const overlay = document.getElementById('year-anim');
  const inner   = document.getElementById('year-anim-inner');
  const MONTHS  = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];
  const MSHORT  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS    = ['S','M','T','W','T','F','S'];
  const now      = new Date();
  const thisYear = now.getFullYear();
  const thisMonth= now.getMonth();
  const today    = now.getDate();

  /* ── build mini month card ── */
  function miniMonth(m) {
    const firstDay    = new Date(thisYear, m, 1).getDay();
    const daysInMonth = new Date(thisYear, m+1, 0).getDate();
    const isCur = m === thisMonth;
    let cells = DAYS.map(d => `<div class="ya-mini-cell lbl">${d}</div>`).join('');
    for (let i=0; i<firstDay; i++) cells += `<div class="ya-mini-cell emp"></div>`;
    for (let d=1; d<=daysInMonth; d++) {
      let cls = 'ya-mini-cell';
      if (isCur && d===today) cls += ' tod';
      else if (isCur)         cls += ' cur';
      cells += `<div class="${cls}">${d}</div>`;
    }
    return `
      <div class="ya-month${isCur?' current':''}" id="ya-m${m}">
        <div class="ya-month-name">${MSHORT[m]}</div>
        <div class="ya-mini-grid">${cells}</div>
      </div>`;
  }

  /* ── build full-page month ── */
  function fullMonth(m) {
    const firstDay    = new Date(thisYear, m, 1).getDay();
    const daysInMonth = new Date(thisYear, m+1, 0).getDate();
    let cells = DAYS.map(d => `<div class="ya-fp-cell lbl">${d}</div>`).join('');
    for (let i=0; i<firstDay; i++) cells += `<div class="ya-fp-cell emp"></div>`;
    for (let d=1; d<=daysInMonth; d++) {
      const dow = (firstDay+d-1)%7;
      let cls = 'ya-fp-cell';
      if (d===today)            cls += ' tod';
      else if (dow===0||dow===6) cls += ' wkd';
      cells += `<div class="${cls}">${d}</div>`;
    }
    return `
      <div class="ya-fp-month">${MONTHS[m]}</div>
      <div class="ya-fp-year">${thisYear}</div>
      <div class="ya-fp-divider"></div>
      <div class="ya-fp-grid">${cells}</div>`;
  }

  /* ── DOM ── */
  inner.innerHTML = `
    <div id="ya-scaler">
      <div id="ya-grid">${Array.from({length:12},(_,i)=>miniMonth(i)).join('')}</div>
    </div>
    <div id="ya-fullpage"><div id="ya-fullpage-inner"></div></div>`;

  const scaler   = inner.querySelector('#ya-scaler');
  const grid     = inner.querySelector('#ya-grid');
  const fullpage = inner.querySelector('#ya-fullpage');
  const fpInner  = inner.querySelector('#ya-fullpage-inner');

  overlay.classList.add('active');

  /* ── Phase 1: grid fades in (t=0→500ms) ── */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { grid.classList.add('show'); });
  });

  /* ── Phase 2: zoom into current-month card (t=900ms) ──
     Figure out where the current month sits in the 3-col grid so we can
     set the transform-origin to that cell's center before scaling up.   */
  setTimeout(() => {
    const col = thisMonth % 3;          // 0,1,2
    const row = Math.floor(thisMonth/3);// 0,1,2,3
    // origin as % of the 300-px scaler width/height
    // Each col is ~33.33%, each row is roughly 25% of total grid height
    const ox = (col/3 + 1/6) * 100;    // centre of column
    const oy = (row/4 + 1/8) * 100;    // centre of row (4 rows total)
    scaler.style.transformOrigin = `${ox}% ${oy}%`;
    scaler.style.transform = 'scale(8)';
    scaler.style.opacity   = '0';
  }, 900);

  /* ── Phase 3: full-month page blooms in (t=2900ms) ── */
  setTimeout(() => {
    fpInner.innerHTML = fullMonth(thisMonth);
    fullpage.classList.add('show');
  }, 2900);

  /* ── Phase 4: fade everything out and finish (t=3900ms) ── */
  setTimeout(() => {
    overlay.style.transition = 'opacity 0.45s ease';
    overlay.style.opacity = '0';
  }, 3900);

  setTimeout(() => {
    overlay.classList.remove('active');
    overlay.style.opacity = '';
    overlay.style.transition = '';
    inner.innerHTML = '';
    onDone();
  }, 4380);
}

// ---- Storage ----
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadData() {
  try {
    const snap = await getDoc(doc(db, 'users', currentUser, 'data', 'entries'));
    entries = snap.exists() ? (snap.data().entries || {}) : {};
  } catch(e) { entries = {}; }
}

async function saveData() {
  try {
    await setDoc(doc(db, 'users', currentUser, 'data', 'entries'), { entries });
  } catch(e) { console.error('Save failed', e); }
}

function getEntry(d) {
  return entries[dateKey(d)] || { note: '', recordings: [] };
}

function setEntry(d, data) {
  entries[dateKey(d)] = data;
  saveData();
}

// ---- Calendar ----
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month-label');
  label.textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

  grid.innerHTML = '';

  // Day labels
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
  const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
  const daysInPrev = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
  const today = new Date();

  // Previous month overflow
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = daysInPrev - i;
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.innerHTML = `<span class="cal-day-num">${d}</span>`;

    const thisDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
    const key = dateKey(thisDate);

    if (d === today.getDate() && currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) {
      el.classList.add('today');
    }
    if (dateKey(thisDate) === dateKey(selectedDate)) {
      el.classList.add('selected');
    }
    if (entries[key] && (entries[key].blocks?.some(b => b.note || b.piece) || (entries[key].recordings && entries[key].recordings.length))) {
      el.classList.add('has-entry');
    }
    const activeGoal = goals.find(g => g.date === key && !g.done);
    const doneGoal   = goals.find(g => g.date === key && g.done);
    if (activeGoal) {
      el.classList.add('has-goal');
      el.style.setProperty('--star-color', activeGoal.color || '#b89a6a');
    } else if (doneGoal) {
      el.classList.add('has-goal-done');
    }
    const activeMini = miniGoals.find(m => m.date === key && !m.done);
    const doneMini   = miniGoals.find(m => m.date === key && m.done);
    if (activeMini) el.classList.add('has-mini-goal');
    else if (doneMini) el.classList.add('has-mini-goal-done');

    el.onclick = () => selectDate(thisDate);
    grid.appendChild(el);
  }
}

function selectDate(d) {
  selectedDate = new Date(d);
  renderCalendar();
  loadJournalForDate();
}

function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  renderCalendar();
}

function goToToday() {
  const today = new Date();
  currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
  selectedDate = new Date(today);
  renderCalendar();

}

// ---- Journal ----
function formatDateLabel(d) {
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  return d.toLocaleDateString('en-US', opts);
}

function loadJournalForDate() {
  const entry = getEntry(selectedDate);
  document.getElementById('selected-date-label').textContent = formatDateLabel(selectedDate);
  renderBlocks(entry.blocks || []);
  renderRecordings(entry.recordings || []);
}

function saveBlock(index) {
  const entry = getEntry(selectedDate);
  if (!entry.blocks) entry.blocks = [];
  const blockEl = document.querySelectorAll('.practice-block')[index];
  const piece = blockEl.querySelector('.block-piece-input').value;
  const note = blockEl.querySelector('.block-note').value;
  entry.blocks[index] = { piece, note, saved: true };
  setEntry(selectedDate, entry);
  renderCalendar();

  // Update saved view content and collapse
  blockEl.querySelector('.block-saved-piece').innerHTML = piece || '<span style="color:var(--border);font-family:Jost,sans-serif;font-size:0.8rem;">No piece</span>';
  const noteEl = blockEl.querySelector('.block-saved-note');
  if (noteEl) noteEl.textContent = note;
  else if (note) {
    const div = document.createElement('div');
    div.className = 'block-saved-note';
    div.textContent = note;
    blockEl.querySelector('.block-saved-piece').after(div);
  }
  blockEl.classList.add('is-saved');
}

function deleteBlock(index) {
  const entry = getEntry(selectedDate);
  if (!entry.blocks) return;
  entry.blocks.splice(index, 1);
  setEntry(selectedDate, entry);
  renderCalendar();
  renderBlocks(entry.blocks);
}

function renderBlocks(blocks) {
  const list = document.getElementById('blocks-list');
  list.innerHTML = '';
  blocks.forEach((b, i) => createBlockEl(b, i));

    ${data.note ? `<div class="block-saved-note">${data.note}</div>` : ''}

  `;


  // ⋯ button

    e.stopPropagation();
    const isOpen = menu.classList.contains('open');

function addBlock() {
  const entry = getEntry(selectedDate);
  if (!entry.blocks) entry.blocks = [];
  entry.blocks.push({ piece: '', note: '' });
  setEntry(selectedDate, entry);
  renderBlocks(entry.blocks);

  const blocks = document.querySelectorAll('.practice-block');
  if (blocks.length) blocks[blocks.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });

// ---- Recordings ----
function addRecordingLink() {
  const input = document.getElementById('rec-link-input');
  const url = input.value.trim();
  if (!url) return;
  // Basic URL validation
  try { new URL(url); } catch { alert('Please enter a valid URL.'); return; }
  const entry = getEntry(selectedDate);
  if (!entry.recordings) entry.recordings = [];
  // Use hostname as display label, cleaned up
  let label = '';
  try {
    const u = new URL(url);
    label = u.hostname.replace(/^www\./, '');
  } catch { label = url; }
  entry.recordings.push({ name: label, url });
  setEntry(selectedDate, entry);
  renderCalendar();
  renderRecordings(entry.recordings);
  input.value = '';
}

function renderRecordings(recordings) {
  const list = document.getElementById('recordings-list');
  list.innerHTML = '';

  recordings.forEach((rec, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'recording-item-wrap';

    const deleteBg = document.createElement('div');
    deleteBg.className = 'recording-item-delete-bg';
    deleteBg.textContent = 'Delete';

    const item = document.createElement('div');
    item.className = 'recording-item';

    // Link icon
    const icon = document.createElement('div');
    icon.className = 'rec-link-icon';
    icon.textContent = '🔗';

    const info = document.createElement('div');
    info.className = 'rec-info';

    const nameEl = document.createElement('a');
    nameEl.className = 'rec-name';
    nameEl.href = rec.url;
    nameEl.target = '_blank';
    nameEl.rel = 'noopener noreferrer';
    nameEl.textContent = rec.name || rec.url;

    const urlPreview = document.createElement('div');
    urlPreview.className = 'rec-url-preview';
    urlPreview.textContent = rec.url;

    info.appendChild(nameEl);
    info.appendChild(urlPreview);

    // ⋯ button
    const dotsBtn = document.createElement('button');
    dotsBtn.className = 'item-dots-btn';
    dotsBtn.textContent = '⋯';
    dotsBtn.title = 'Options';

    const menu = document.createElement('div');
    menu.className = 'dots-menu';

    const delBtn = document.createElement('button');
    delBtn.className = 'dots-menu-item danger';
    delBtn.textContent = 'Delete';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.remove('open');
      deleteRecording(i);
    });
    menu.appendChild(delBtn);
    document.body.appendChild(menu);

    dotsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('open');
      closeAllDotsMenus(null);
      if (!isOpen) {
        const r = dotsBtn.getBoundingClientRect();
        menu.style.top = (r.bottom + 4) + 'px';
        menu.style.right = (window.innerWidth - r.right) + 'px';
        menu.classList.add('open');
      }
    });

    item.appendChild(icon);
    item.appendChild(info);
    item.appendChild(dotsBtn);
    wrap.appendChild(deleteBg);
    wrap.appendChild(item);
    list.appendChild(wrap);

    // Swipe left to delete (touch only)
    let startX = 0, startY = 0, currentX = 0, isSwiping = false;
    const THRESHOLD = 72;

    function onStart(e) {
      if (e.type === 'mousedown' && window.matchMedia('(pointer: fine)').matches) return;
      startX = e.touches ? e.touches[0].clientX : e.clientX;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      currentX = 0;
      isSwiping = false;
      item.classList.add('swiping');
    }
    function onMove(e) {
      const dx = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
      const dy = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
      if (!isSwiping && Math.abs(dy) > Math.abs(dx)) { item.classList.remove('swiping'); return; }
      isSwiping = true;
      if (dx > 0) return;
      currentX = dx;
      item.style.transform = `translateX(${Math.max(dx, -THRESHOLD - 20)}px)`;
    }
    function onEnd() {
      item.classList.remove('swiping');
      if (currentX < -THRESHOLD) {
        item.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
        item.style.transform = `translateX(-100%)`;
        item.style.opacity = '0';
        setTimeout(() => deleteRecording(i), 260);
      } else {
        item.style.transition = 'transform 0.25s ease';
        item.style.transform = '';
        setTimeout(() => item.style.transition = '', 260);
      }
    }

    item.addEventListener('touchstart', onStart, { passive: true });
    item.addEventListener('touchmove', onMove, { passive: true });
    item.addEventListener('touchend', onEnd);
  });
}

function deleteRecording(i) {
  const entry = getEntry(selectedDate);
  entry.recordings.splice(i, 1);
  setEntry(selectedDate, entry);
  renderCalendar();
  renderRecordings(entry.recordings);
}

    weekKeys.push(dateKey(d));
  }
  const weekEntries = weekKeys.filter(k => entries[k] && (entries[k].note || entries[k].pieces?.length || entries[k].recordings?.length));

  if (weekEntries.length === 0) {

    const el = document.createElement('div');

    el.innerHTML = `
      <div class="recent-date">${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
      ${entry.pieces?.length
        ? entry.pieces.map((p, i) => `<div class="recent-piece-line"><span class="recent-piece-name">${p}</span>${i === entry.pieces.length - 1 && entry.note ? `<span class="recent-piece-note"> — ${entry.note}</span>` : ''}</div>`).join('')
        : entry.note ? `<div class="recent-piece-line"><span class="recent-piece-note">${entry.note}</span></div>`
