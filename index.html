<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Practice">
<title>Practice Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4df;
    --text: #1a1a1a;
    --muted: #999;
    --accent: #2c2c2c;
    --soft: #f3f0ec;
    --gold: #b89a6a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    color: var(--text);
    overflow: hidden;
  }

  /* ---- App Shell ---- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
  }

  /* ---- Header ---- */
  .header {
    padding: 52px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .today-btn {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    transition: all 0.2s;
  }
  .today-btn:hover { color: var(--text); border-color: var(--text); }

  /* ---- Calendar ---- */
  .calendar {
    margin-bottom: 4px;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  .cal-arrow {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .cal-arrow:hover { color: var(--text); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-label {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.15s;
    position: relative;
    color: var(--text);
  }

  .cal-day:hover { background: var(--soft); }
  .cal-day.empty { cursor: default; }
  .cal-day.today { font-weight: 500; }
  .cal-day.selected { background: var(--accent); color: #fff; }
  .cal-day.selected:hover { background: var(--accent); }

  .cal-day.has-entry::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
  }
  .cal-day.selected.has-entry::after { background: rgba(255,255,255,0.6); }

  .cal-day.has-goal::before {
    content: '◆';
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.3rem;
    color: var(--gold);
    line-height: 1;
  }
  .cal-day.selected.has-goal::before { color: rgba(255,255,255,0.8); }

  .cal-day.other-month { color: var(--border); cursor: default; }

  /* ---- Scrollable Content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 100px;
    -webkit-overflow-scrolling: touch;
  }

  .selected-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    color: var(--text);
  }

  /* ---- Note Section ---- */
  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .note-area {
    width: 100%;
    min-height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    line-height: 1.7;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }
  .note-area:focus { border-color: var(--accent); }
  .note-area::placeholder { color: var(--border); }

  .save-btn {
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: background 0.2s;
    border-radius: 2px;
  }
  .save-btn:hover { background: #444; }
  .save-btn.saved { background: #6a8c6a; }

  /* ---- Recordings Section ---- */
  .section-gap { margin-top: 24px; }

  .upload-area {
    border: 1px dashed var(--border);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    background: var(--surface);
  }
  .upload-area:hover { border-color: var(--accent); background: var(--soft); }

  .upload-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }
  .upload-sub { font-size: 0.65rem; color: var(--border); margin-top: 3px; }

  #file-input { display: none; }

  .recordings-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }

  .recording-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 14px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rec-play {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.7rem;
    transition: background 0.2s;
  }
  .rec-play:hover { background: #444; }
  .rec-play.playing { background: var(--gold); }

  .rec-info { flex: 1; min-width: 0; }
  .rec-name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-duration { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  .rec-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .rec-delete:hover { color: #c0392b; }

  audio { display: none; }

  /* ---- Bottom Nav ---- */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(250, 249, 247, 0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 24px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 0;
    background: none;
    border: none;
    color: var(--muted);
    transition: color 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 1.2rem; }
  .nav-label { font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; }

  /* ---- Stats View ---- */
  .view { display: none; }
  .view.active { display: block; }

  .stats-header {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px;
    border-radius: 2px;
    margin-bottom: 10px;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .recent-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 2px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .recent-entry:hover { background: var(--soft); }
  .recent-date { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
  .recent-text { font-size: 0.82rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 10px; }

  /* ---- Goals ---- */
  .goal-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 2px;
    margin-bottom: 4px;
  }

  .goal-date-input {
    width: 100%;
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .goal-date-input:focus { border-color: var(--accent); }

  .goal-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .goal-item.done {
    opacity: 0.5;
  }

  .goal-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: none;
  }
  .goal-check:hover { border-color: var(--accent); }
  .goal-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 0.6rem; }

  .goal-body { flex: 1; min-width: 0; }
  .goal-text { font-size: 0.85rem; line-height: 1.5; margin-bottom: 4px; }
  .goal-text.done { text-decoration: line-through; color: var(--muted); }
  .goal-due { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
  .goal-due.overdue { color: #c0392b; }

  .goal-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .goal-delete:hover { color: #c0392b; }
</style>
</head>
<body>
<div class="app">

  <!-- Header + Calendar -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">Practice Journal</div>
      <button class="today-btn" onclick="goToToday()">Today</button>
    </div>
    <div class="calendar">
      <div class="cal-nav">
        <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-arrow" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="content">

    <!-- Journal View -->
    <div class="view active" id="view-journal">
      <div class="selected-date" id="selected-date-label"></div>

      <div class="section-label">Practice Notes</div>
      <textarea class="note-area" id="note-area" placeholder="What did you work on today? Pieces, techniques, breakthroughs..."></textarea>
      <button class="save-btn" id="save-btn" onclick="saveNote()">Save Note</button>

      <div class="section-gap">
        <div class="section-label">Recordings</div>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
          <div class="upload-icon">🎵</div>
          <div class="upload-text">Tap to upload a recording</div>
          <div class="upload-sub">MP3, M4A, WAV, AAC</div>
        </div>
        <input type="file" id="file-input" accept="audio/*" onchange="handleFileUpload(event)">
        <div class="recordings-list" id="recordings-list"></div>
      </div>
    </div>

    <!-- Stats View -->
    <div class="view" id="view-stats">
      <div class="stats-header">Overview</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Total Entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-streak">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
      </div>

      <div class="section-label" style="margin-bottom:10px;">Recent Entries</div>
      <div id="recent-list"></div>
    </div>

    <!-- Goals View -->
    <div class="view" id="view-goals">
      <div class="stats-header">Goals</div>

      <!-- Add Goal Form -->
      <div class="goal-form">
        <div class="section-label" style="margin-bottom:8px;">New Goal</div>
        <textarea class="note-area" id="goal-input" placeholder="What do you want to achieve? (e.g. Learn the Chopin Ballade No.1, perfect the Coda section...)" style="min-height:90px;"></textarea>
        <input type="date" id="goal-date" class="goal-date-input">
        <button class="save-btn" onclick="addGoal()" style="margin-top:8px;">Add Goal</button>
      </div>

      <div class="section-label" style="margin-top:24px;margin-bottom:10px;">Active Goals</div>
      <div id="goals-list"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active" id="nav-journal" onclick="switchView('journal')">
      <div class="nav-icon">📖</div>
      <div class="nav-label">Journal</div>
    </button>
    <button class="nav-item" id="nav-stats" onclick="switchView('stats')">
      <div class="nav-icon">✦</div>
      <div class="nav-label">Overview</div>
    </button>
    <button class="nav-item" id="nav-goals" onclick="switchView('goals')">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Goals</div>
    </button>
  </div>
</div>

<script>
// ---- State ----
let currentDate = new Date();
let selectedDate = new Date();
let entries = {};     // { 'YYYY-MM-DD': { note: '', recordings: [] } }
let audioPlayers = {};

// ---- Storage ----
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try { entries = JSON.parse(localStorage.getItem('pj_entries') || '{}'); } catch(e) { entries = {}; }
}

function saveData() {
  localStorage.setItem('pj_entries', JSON.stringify(entries));
}

function getEntry(d) {
  return entries[dateKey(d)] || { note: '', recordings: [] };
}

function setEntry(d, data) {
  entries[dateKey(d)] = data;
  saveData();
}

// ---- Calendar ----
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month-label');
  label.textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

  grid.innerHTML = '';

  // Day labels
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
  const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
  const daysInPrev = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
  const today = new Date();

  // Previous month overflow
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = daysInPrev - i;
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    const thisDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
    const key = dateKey(thisDate);

    if (d === today.getDate() && currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) {
      el.classList.add('today');
    }
    if (dateKey(thisDate) === dateKey(selectedDate)) {
      el.classList.add('selected');
    }
    if (entries[key] && (entries[key].note || (entries[key].recordings && entries[key].recordings.length))) {
      el.classList.add('has-entry');
    }
    if (goals.some(g => g.date === key && !g.done)) {
      el.classList.add('has-goal');
    }

    el.onclick = () => selectDate(thisDate);
    grid.appendChild(el);
  }
}

function selectDate(d) {
  selectedDate = new Date(d);
  renderCalendar();
  loadJournalForDate();
}

function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  renderCalendar();
}

function goToToday() {
  const today = new Date();
  currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
  selectedDate = new Date(today);
  renderCalendar();
  loadJournalForDate();
}

// ---- Journal ----
function formatDateLabel(d) {
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  return d.toLocaleDateString('en-US', opts);
}

function loadJournalForDate() {
  const entry = getEntry(selectedDate);
  document.getElementById('selected-date-label').textContent = formatDateLabel(selectedDate);
  document.getElementById('note-area').value = entry.note || '';
  document.getElementById('save-btn').className = 'save-btn';
  document.getElementById('save-btn').textContent = 'Save Note';
  renderRecordings(entry.recordings || []);
}

function saveNote() {
  const entry = getEntry(selectedDate);
  entry.note = document.getElementById('note-area').value;
  setEntry(selectedDate, entry);
  renderCalendar();

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saved ✓';
  btn.className = 'save-btn saved';
  setTimeout(() => {
    btn.textContent = 'Save Note';
    btn.className = 'save-btn';
  }, 2000);
}

// ---- Recordings ----
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const entry = getEntry(selectedDate);
    if (!entry.recordings) entry.recordings = [];
    entry.recordings.push({
      name: file.name,
      data: ev.target.result,
      size: file.size
    });
    setEntry(selectedDate, entry);
    renderCalendar();
    renderRecordings(entry.recordings);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderRecordings(recordings) {
  const list = document.getElementById('recordings-list');
  list.innerHTML = '';
  audioPlayers = {};

  recordings.forEach((rec, i) => {
    const item = document.createElement('div');
    item.className = 'recording-item';

    const audio = new Audio(rec.data);
    audioPlayers[i] = { audio, playing: false };

    audio.onended = () => {
      audioPlayers[i].playing = false;
      playBtn.className = 'rec-play';
      playBtn.textContent = '▶';
    };

    const playBtn = document.createElement('button');
    playBtn.className = 'rec-play';
    playBtn.textContent = '▶';
    playBtn.onclick = () => {
      if (audioPlayers[i].playing) {
        audio.pause();
        audioPlayers[i].playing = false;
        playBtn.className = 'rec-play';
        playBtn.textContent = '▶';
      } else {
        // Stop all others
        Object.keys(audioPlayers).forEach(k => {
          if (k != i && audioPlayers[k].playing) {
            audioPlayers[k].audio.pause();
            audioPlayers[k].playing = false;
          }
        });
        list.querySelectorAll('.rec-play').forEach(b => { b.className = 'rec-play'; b.textContent = '▶'; });
        audio.play();
        audioPlayers[i].playing = true;
        playBtn.className = 'rec-play playing';
        playBtn.textContent = '■';
      }
    };

    const info = document.createElement('div');
    info.className = 'rec-info';
    const name = document.createElement('div');
    name.className = 'rec-name';
    name.textContent = rec.name;
    const dur = document.createElement('div');
    dur.className = 'rec-duration';
    dur.textContent = formatSize(rec.size);
    info.appendChild(name);
    info.appendChild(dur);

    const del = document.createElement('button');
    del.className = 'rec-delete';
    del.textContent = '×';
    del.onclick = () => deleteRecording(i);

    item.appendChild(playBtn);
    item.appendChild(info);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function deleteRecording(i) {
  if (audioPlayers[i]) { audioPlayers[i].audio.pause(); }
  const entry = getEntry(selectedDate);
  entry.recordings.splice(i, 1);
  setEntry(selectedDate, entry);
  renderCalendar();
  renderRecordings(entry.recordings);
}

function formatSize(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

// ---- Stats ----
function renderStats() {
  const keys = Object.keys(entries).filter(k => entries[k].note || (entries[k].recordings && entries[k].recordings.length));
  document.getElementById('stat-total').textContent = keys.length;

  // Streak
  let streak = 0;
  let check = new Date();
  check.setHours(0,0,0,0);
  while (true) {
    const k = dateKey(check);
    if (entries[k] && (entries[k].note || (entries[k].recordings && entries[k].recordings.length))) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else break;
  }
  document.getElementById('stat-streak').textContent = streak;

  // Recent entries
  const recent = document.getElementById('recent-list');
  recent.innerHTML = '';
  const sorted = keys.sort((a,b) => b.localeCompare(a)).slice(0, 10);

  if (sorted.length === 0) {
    recent.innerHTML = '<div class="empty-state"><div class="empty-icon">🎹</div><div>No entries yet.<br>Start journaling today!</div></div>';
    return;
  }

  sorted.forEach(key => {
    const entry = entries[key];
    const d = new Date(key + 'T00:00:00');
    const el = document.createElement('div');
    el.className = 'recent-entry';
    el.innerHTML = `
      <div class="recent-date">${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}</div>
      <div class="recent-text">${entry.note || (entry.recordings?.length ? `🎵 ${entry.recordings.length} recording(s)` : '')}</div>
    `;
    el.onclick = () => {
      selectedDate = new Date(key + 'T00:00:00');
      currentDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      switchView('journal');
    };
    recent.appendChild(el);
  });
}

// ---- Navigation ----
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.getElementById(`nav-${view}`).classList.add('active');

  if (view === 'stats') renderStats();
  if (view === 'journal') { renderCalendar(); loadJournalForDate(); }
  if (view === 'goals') renderGoals();
}

// ---- Goals ----
let goals = [];

function loadGoals() {
  try { goals = JSON.parse(localStorage.getItem('pj_goals') || '[]'); } catch(e) { goals = []; }
}

function saveGoals() {
  localStorage.setItem('pj_goals', JSON.stringify(goals));
}

function addGoal() {
  const text = document.getElementById('goal-input').value.trim();
  const date = document.getElementById('goal-date').value;
  if (!text) return;
  goals.push({ id: Date.now(), text, date, done: false });
  saveGoals();
  document.getElementById('goal-input').value = '';
  document.getElementById('goal-date').value = '';
  renderCalendar();
  renderGoals();
}

function toggleGoal(id) {
  const g = goals.find(g => g.id === id);
  if (g) { g.done = !g.done; saveGoals(); renderCalendar(); renderGoals(); }
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  saveGoals();
  renderCalendar();
  renderGoals();
}

function renderGoals() {
  const list = document.getElementById('goals-list');
  list.innerHTML = '';

  // Sort: undone first, then by date
  const sorted = [...goals].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><div>No goals yet.<br>Add one above!</div></div>';
    return;
  }

  sorted.forEach(g => {
    const today = new Date().toISOString().split('T')[0];
    const isOverdue = g.date && g.date < today && !g.done;

    const item = document.createElement('div');
    item.className = 'goal-item' + (g.done ? ' done' : '');

    const check = document.createElement('button');
    check.className = 'goal-check' + (g.done ? ' checked' : '');
    check.textContent = g.done ? '✓' : '';
    check.onclick = () => toggleGoal(g.id);

    const body = document.createElement('div');
    body.className = 'goal-body';

    const text = document.createElement('div');
    text.className = 'goal-text' + (g.done ? ' done' : '');
    text.textContent = g.text;

    body.appendChild(text);

    if (g.date) {
      const due = document.createElement('div');
      due.className = 'goal-due' + (isOverdue ? ' overdue' : '');
      const d = new Date(g.date + 'T00:00:00');
      due.textContent = (isOverdue ? 'Overdue · ' : 'By · ') + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      body.appendChild(due);
    }

    const del = document.createElement('button');
    del.className = 'goal-delete';
    del.textContent = '×';
    del.onclick = () => deleteGoal(g.id);

    item.appendChild(check);
    item.appendChild(body);
    item.appendChild(del);
    list.appendChild(item);
  });
}

// ---- Init ----
loadData();
loadGoals();
renderCalendar();
loadJournalForDate();
</script>
