<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Practice">
<title>Practice Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4df;
    --text: #1a1a1a;
    --muted: #999;
    --accent: #2c2c2c;
    --soft: #f3f0ec;
    --gold: #b89a6a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    color: var(--text);
    overflow: hidden;
  }

  /* ---- App Shell ---- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
    visibility: hidden;
  }

  /* ---- Header ---- */
  .header {
    padding: 52px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .today-btn {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    transition: all 0.2s;
  }
  .today-btn:hover { color: var(--text); border-color: var(--text); }

  /* ---- Calendar ---- */
  .calendar {
    margin-bottom: 4px;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  .cal-arrow {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .cal-arrow:hover { color: var(--text); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-label {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.15s;
    position: relative;
    color: var(--text);
  }

  .cal-day:hover { background: var(--soft); }
  .cal-day.empty { cursor: default; }
  .cal-day.today { font-weight: 500; }
  .cal-day.selected { background: var(--accent); color: #fff; }
  .cal-day.selected:hover { background: var(--accent); }

  .cal-day-num {
    position: relative;
    z-index: 1;
  }

  .cal-day.has-entry::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
  }
  .cal-day.selected.has-entry::after { background: rgba(255,255,255,0.6); }

  .cal-day.has-goal::before {
    content: '★';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.6rem;
    color: var(--gold);
    opacity: 1;
    line-height: 1;
    pointer-events: none;
    z-index: 0;
  }
  .cal-day.has-goal { z-index: 0; }
  .cal-day.selected.has-goal::before { color: rgba(255,255,255,0.6); }

  .cal-day.has-goal-done::before {
    content: '★';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.6rem;
    color: #ccc;
    opacity: 1;
    line-height: 1;
    pointer-events: none;
    z-index: 0;
  }
  .cal-day.has-goal-done { z-index: 0; }
  .cal-day.selected.has-goal-done::before { color: rgba(255,255,255,0.4); }

  .cal-day.other-month { color: var(--border); cursor: default; }

  /* ---- Scrollable Content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 100px;
    -webkit-overflow-scrolling: touch;
  }

  .selected-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    color: var(--text);
  }

  /* ---- Note Section ---- */
  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .note-area {
    width: 100%;
    min-height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    line-height: 1.7;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }
  .note-area:focus { border-color: var(--accent); }
  .note-area::placeholder { color: var(--border); }
  .practice-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    margin-bottom: 10px;
    transition: background 0.3s, padding 0.3s;
  }

  .practice-block.is-saved {
    background: #f5f0e8;
    border-color: #e0d5c0;
    padding: 10px 14px;
    cursor: pointer;
  }

  .block-saved-view {
    display: none;
  }
  .practice-block.is-saved .block-saved-view {
    display: block;
  }
  .practice-block.is-saved .block-edit-view {
    display: none;
  }

  .block-saved-piece {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 2px;
  }
  .block-saved-note {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .block-saved-hint {
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c8b89a;
    margin-top: 6px;
  }

  .block-piece-input {
    width: 100%;
    padding: 8px 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    outline: none;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .block-piece-input:focus { border-bottom-color: var(--accent); }
  .block-piece-input::placeholder { color: var(--border); font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 300; }

  .block-note {
    width: 100%;
    min-height: 100px;
    background: transparent;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.86rem;
    font-weight: 300;
    line-height: 1.7;
    color: var(--text);
    resize: none;
    outline: none;
  }
  .block-note::placeholder { color: var(--border); }

  .block-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .block-save-btn {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .block-save-btn:hover { background: #444; }
  .block-save-btn.saved { background: #6a8c6a; }

  .block-delete-btn {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none;
    color: var(--muted);
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    padding: 6px 0;
    transition: color 0.2s;
  }
  .block-delete-btn:hover { color: #c0392b; }

  .add-block-btn {
    width: 100%;
    padding: 10px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .add-block-btn:hover { border-color: var(--accent); color: var(--accent); }

  .save-btn {
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: background 0.2s;
    border-radius: 2px;
  }
  .save-btn:hover { background: #444; }
  .save-btn.saved { background: #6a8c6a; }

  /* ---- Recordings Section ---- */
  .section-gap { margin-top: 24px; }

  .upload-area {
    border: 1px dashed var(--border);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    background: var(--surface);
  }
  .upload-area:hover { border-color: var(--accent); background: var(--soft); }

  .upload-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }
  .upload-sub { font-size: 0.65rem; color: var(--border); margin-top: 3px; }

  #file-input { display: none; }

  .recordings-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }

  .recording-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 14px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rec-play {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.7rem;
    transition: background 0.2s;
  }
  .rec-play:hover { background: #444; }
  .rec-play.playing { background: var(--gold); }

  .rec-info { flex: 1; min-width: 0; }
  .rec-name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-duration { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  .rec-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .rec-delete:hover { color: #c0392b; }

  audio { display: none; }

  /* ---- Bottom Nav ---- */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(250, 249, 247, 0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 24px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 0;
    background: none;
    border: none;
    color: var(--muted);
    transition: color 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 1.2rem; }
  .nav-label { font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; }

  /* ---- Stats View ---- */
  .view { display: none; }
  .view.active { display: block; }

  .stats-header {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px;
    border-radius: 2px;
    margin-bottom: 10px;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .recent-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 2px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .recent-entry:hover { background: var(--soft); }
  .recent-date { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
  .recent-piece-line { font-size: 0.88rem; line-height: 1.6; }
  .recent-piece-name { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; color: var(--text); }
  .recent-piece-note { font-family: 'Jost', sans-serif; font-size: 0.78rem; color: var(--muted); margin-left: 4px; }

  .all-pieces-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .all-piece-chip {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.88rem;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 10px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 10px; }

  /* ---- Goals ---- */
  .goal-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 2px;
    margin-bottom: 4px;
  }

  .goal-date-input {
    width: 100%;
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .goal-date-input:focus { border-color: var(--accent); }

  .goal-item-wrap {
    position: relative;
    margin-bottom: 8px;
    overflow: hidden;
    border-radius: 2px;
  }
  .goal-item-delete-bg {
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .goal-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
    transform: translateX(0);
    transition: transform 0.2s ease;
    will-change: transform;
    touch-action: pan-y;
    cursor: grab;
  }
  .goal-item.done { opacity: 0.5; }
  .goal-item.swiping { transition: none; }

  .goal-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: none;
  }
  .goal-check:hover { border-color: var(--accent); }
  .goal-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 0.6rem; }

  .goal-body { flex: 1; min-width: 0; }
  .goal-text { font-size: 0.85rem; line-height: 1.5; margin-bottom: 4px; }
  .goal-text.done { text-decoration: line-through; color: var(--muted); }
  .goal-due { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
  .goal-due.overdue { color: #c0392b; }

  .goal-delete { display: none; }

  .add-block-fab {
    display: block;
    width: 100%;
    margin-top: 10px;
    margin-bottom: 4px;
    padding: 11px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .add-block-fab:hover { border-color: var(--accent); color: var(--accent); }

  /* ---- Add Goal Button & Sheet ---- */
  .add-goal-fab {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .add-goal-fab:hover { border-color: var(--accent); color: var(--accent); }

  .goal-sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 800;
  }
  .goal-sheet-overlay.open { display: block; }

  .goal-sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--bg);
    border-radius: 12px 12px 0 0;
    padding: 16px 24px 32px;
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
    z-index: 900;
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 92dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .goal-sheet.open { transform: translateX(-50%) translateY(0); }

  .goal-sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  /* ---- Year Animation ---- */
  .year-anim {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1500;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .year-anim.active { display: flex; }

  .year-anim-inner {
    width: 100%;
    max-width: 430px;
    padding: 24px 16px;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
  }

  .year-anim-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-align: center;
    color: var(--muted);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeInUp 0.5s ease 0.1s forwards;
  }

  .year-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .year-month {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeInUp 0.4s ease forwards;
  }

  .year-month-name {
    font-family: 'Jost', sans-serif;
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    text-align: center;
  }

  .year-mini-cal {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }

  .year-mini-day {
    font-family: 'Jost', sans-serif;
    font-size: 0.48rem;
    font-weight: 300;
    color: var(--text);
    text-align: center;
    padding: 1.5px 0;
    line-height: 1;
    border-radius: 50%;
  }

  .year-mini-day.label {
    color: var(--muted);
    font-size: 0.42rem;
    font-weight: 400;
  }

  .year-mini-day.today-dot {
    background: var(--text);
    color: var(--bg);
    border-radius: 50%;
  }

  .year-mini-day.current-month-hi {
    background: rgba(184,154,106,0.25);
    border-radius: 2px;
  }

  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .year-anim-inner.zoom-out {
    transform: scale(3.5) translateY(-18%);
    opacity: 0;
  }

  /* ---- Loading Screen ---- */
    display: flex;
    position: fixed;
    inset: 0;
    background: var(--bg);

<body>
<div class="app">

  <!-- Header + Calendar -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">Practice Journal</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="login-username-label" id="header-username" style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);"></span>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>
    <div class="calendar" id="cal-section">
      <div class="cal-nav">
        <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-arrow" onclick="changeMonth(1)">›</button>
      </div>
      <div style="text-align:right;margin-bottom:4px;">
        <button class="today-btn" onclick="goToToday()">Today</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="content">

    <!-- Journal View -->
    <div class="view active" id="view-journal">
      <div class="selected-date" id="selected-date-label"></div>
      <button class="add-block-fab" onclick="openBlockForm()">+ Add</button>

      <div id="blocks-list"></div>

      <div class="section-gap">
        <div class="section-label">Recordings</div>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
          <div class="upload-icon">🎵</div>
          <div class="upload-text">Tap to add a recording</div>
          <div class="upload-sub">Music library · Voice Memos · Files</div>
        </div>
        <input type="file" id="file-input" accept="audio/*,.m4a,.mp3,.wav,.aac,.caf,.aiff" onchange="handleFileUpload(event)">
        <div class="recordings-list" id="recordings-list"></div>
      </div>
    </div>

    <!-- Block Form Sheet -->
    <div class="goal-sheet-overlay" id="block-sheet-overlay" onclick="closeBlockForm()"></div>
    <div class="goal-sheet" id="block-sheet">
      <div class="goal-sheet-handle"></div>
      <div class="section-label" style="margin-bottom:6px;">Piece</div>
      <input type="text" class="login-input" id="block-sheet-piece" placeholder="e.g. Chopin Ballade No. 1..." autocomplete="off">
      <div class="section-label" style="margin-top:16px; margin-bottom:6px;">Practice Notes</div>
      <textarea class="note-area" id="block-sheet-note" placeholder="What did you work on? Techniques, breakthroughs..." style="min-height:110px;"></textarea>
      <button class="save-btn" onclick="saveBlockFromSheet()" style="margin-top:12px;">Save</button>
      <button id="block-sheet-delete" onclick="deleteBlockFromSheet()" style="display:none;width:100%;margin-top:8px;padding:11px;background:none;border:1px solid #e0d0d0;color:#c0392b;font-family:'Jost',sans-serif;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;">Remove</button>
    </div>

    <!-- This Week View -->
    <div class="view" id="view-stats">
      <div class="stats-header">This Week</div>
      <div id="week-list"></div>
    </div>

    <!-- Journal View (all entries) -->
    <div class="view" id="view-all">
      <div class="stats-header">Journal</div>
      <div id="all-entries-list"></div>
    </div>

    <!-- Goals View -->
    <div class="view" id="view-goals">
      <div class="stats-header">Goals</div>
      <div id="goals-list"></div>
      <button class="add-goal-fab" onclick="openGoalForm()">+ Add a Goal</button>
    </div>

    <!-- Goal Form Sheet -->
    <div class="goal-sheet-overlay" id="goal-sheet-overlay" onclick="closeGoalForm()"></div>
    <div class="goal-sheet" id="goal-sheet">
      <div class="goal-sheet-handle"></div>
      <div class="section-label" style="margin-bottom:8px;">Target Date</div>
      <input type="date" id="goal-date" class="goal-date-input" style="margin-bottom:16px;">
      <div class="section-label" style="margin-bottom:8px;">Goal</div>
      <textarea class="note-area" id="goal-input" placeholder="e.g. Learn the Chopin Ballade No.1, perfect the Coda section..." style="min-height:100px;"></textarea>
      <button class="save-btn" onclick="addGoal()" style="margin-top:12px;">Add Goal</button>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active" id="nav-journal" onclick="switchView('journal')">
      <div class="nav-icon">✏️</div>
      <div class="nav-label">Log</div>
    </button>
    <button class="nav-item" id="nav-all" onclick="switchView('all')">
      <div class="nav-icon">📖</div>
      <div class="nav-label">Journal</div>
    </button>
    <button class="nav-item" id="nav-goals" onclick="switchView('goals')">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Goals</div>
    </button>
  </div>
</div>

<!-- Login Screen -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-title">Practice Journal</div>
    <div class="login-sub">Your private practice space</div>
    <div class="login-error" id="login-error"></div>
    <div class="section-label" style="margin-bottom:6px;">Username</div>
    <input type="text" class="login-input" id="login-username" placeholder="e.g. yuexuan" autocomplete="off" autocapitalize="none">
    <div class="section-label" style="margin-bottom:6px;margin-top:14px;">PIN <span style="font-size:0.55rem;color:var(--muted);letter-spacing:0;">(4 digits)</span></div>
    <input type="password" class="login-input" id="login-pin" placeholder="••••" maxlength="4" inputmode="numeric">
    <button class="save-btn" style="margin-top:18px;" onclick="handleLogin()">Enter</button>
    <div class="login-hint">New username? We'll create your account automatically.</div>
  </div>
</div>

<!-- Loading Screen -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
</div>

<!-- Year Animation Overlay -->
<div class="year-anim" id="year-anim">
  <div class="year-anim-inner" id="year-anim-inner"></div>
</div>

<!-- Day Detail Modal -->
<div class="day-modal-overlay" id="day-modal-overlay" onclick="closeDayModal()">
  <div class="day-modal" id="day-modal" onclick="event.stopPropagation()">
    <div class="day-modal-close" onclick="closeDayModal()">×</div>
    <div class="day-modal-date" id="day-modal-date"></div>
    <div class="day-modal-body" id="day-modal-body"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOrXnjslPsxFkbWJbbnMgBSyLQcnb95I8",
  authDomain: "practice-journal-c15aa.firebaseapp.com",
  projectId: "practice-journal-c15aa",
  storageBucket: "practice-journal-c15aa.firebasestorage.app",
  messagingSenderId: "232736966786",
  appId: "1:232736966786:web:095d872a70336e152bcc9b"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// ---- State ----
let currentDate = new Date();
let selectedDate = new Date();
let entries = {};     // { 'YYYY-MM-DD': { note: '', recordings: [] } }
let audioPlayers = {};

// ---- Auth ----
let currentUser = null;

async function handleLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.querySelector('#login-screen .save-btn');
  errEl.textContent = '';

  if (!username) { errEl.textContent = 'Please enter a username.'; return; }
  if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'PIN must be exactly 4 digits.'; return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    const userRef = doc(db, 'users', username);
    const snap = await getDoc(userRef);

    if (snap.exists()) {
      // Existing user — verify PIN
      if (snap.data().pin !== pin) {
        errEl.textContent = 'Wrong PIN. Try again.';
        btn.textContent = 'Enter'; btn.disabled = false;
        return;
      }
    } else {
      // New user — create account
      await setDoc(userRef, { pin, createdAt: Date.now() });
    }

    currentUser = username;
    localStorage.setItem('pj_session', username);
    btn.textContent = 'Enter'; btn.disabled = false;
    showApp();
  } catch(e) {
    errEl.textContent = 'Connection error. Check internet and try again.';
    btn.textContent = 'Enter'; btn.disabled = false;
  }
}

function logout() {
  currentUser = null;
  localStorage.removeItem('pj_session');
  entries = {};
  goals = [];
  document.getElementById('login-username').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-screen').classList.add('visible');
  document.querySelector('.app').style.visibility = 'hidden';
}

function playYearAnimation(onDone) {
  const overlay = document.getElementById('year-anim');
  const inner = document.getElementById('year-anim-inner');
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_SHORT = ['S','M','T','W','T','F','S'];
  const now = new Date();
  const thisYear = now.getFullYear();
  const thisMonth = now.getMonth();
  const todayDate = now.getDate();

  inner.innerHTML = `<div class="year-anim-title">${thisYear}</div><div class="year-grid" id="year-grid"></div>`;
  const grid = inner.querySelector('#year-grid');

  for (let m = 0; m < 12; m++) {
    const monthEl = document.createElement('div');
    monthEl.className = 'year-month';
    // stagger each month
    monthEl.style.animationDelay = (0.15 + m * 0.055) + 's';

    const isCurrent = m === thisMonth;

    let html = `<div class="year-month-name" style="${isCurrent ? 'color:var(--accent);font-weight:500;' : ''}">${MONTHS_SHORT[m]}</div>`;
    html += `<div class="year-mini-cal">`;

    // Day labels
    DAYS_SHORT.forEach(d => { html += `<div class="year-mini-day label">${d}</div>`; });

    const firstDay = new Date(thisYear, m, 1).getDay();
    const daysInMonth = new Date(thisYear, m + 1, 0).getDate();

    // Empty cells
    for (let i = 0; i < firstDay; i++) html += `<div class="year-mini-day"></div>`;

    // Days
    for (let d = 1; d <= daysInMonth; d++) {
      let cls = 'year-mini-day';
      if (isCurrent && d === todayDate) cls += ' today-dot';
      else if (isCurrent) cls += ' current-month-hi';
      html += `<div class="${cls}">${d}</div>`;
    }

    html += `</div>`;
    monthEl.innerHTML = html;
    grid.appendChild(monthEl);
  }

  overlay.classList.add('active');

  // After all months appear, zoom into current month
  setTimeout(() => {
    // Find current month element and zoom toward it
    const monthEls = grid.querySelectorAll('.year-month');
    const currentEl = monthEls[thisMonth];
    const col = thisMonth % 3;
    const row = Math.floor(thisMonth / 3);
    // Translate toward current month cell
    const txMap = [-1, 0, 1];
    const tyMap = [-1.5, -0.5, 0.5, 1.5];
    const tx = txMap[col] * 38;
    const ty = tyMap[row] * 38;
    inner.style.transition = 'transform 0.75s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease 0.35s';
    inner.style.transform = `scale(3.8) translate(${-tx}px, ${-ty}px)`;
    inner.style.opacity = '0';
  }, 1800);

  // Hide overlay and show app
  setTimeout(() => {
    overlay.classList.remove('active');
    inner.style.transform = '';
    inner.style.opacity = '';
    onDone();
  }, 2650);
}

async function showApp() {
  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('header-username').textContent = currentUser;
  await loadData();
  await loadGoals();

  playYearAnimation(() => {
    document.querySelector('.app').style.visibility = 'visible';
    renderCalendar();
    loadJournalForDate();
  });
}

async function checkSession() {
  const saved = localStorage.getItem('pj_session');
  if (saved) {
    try {
      const snap = await getDoc(doc(db, 'users', saved));
      if (snap.exists()) {
        currentUser = saved;
        document.getElementById('loading-screen').classList.add('hidden');
        showApp();
        return;
      }
    } catch(e) {}
  }
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.add('visible');
  document.querySelector('.app').style.visibility = 'hidden';
}

// ---- Storage ----
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadData() {
  try {
    const snap = await getDoc(doc(db, 'users', currentUser, 'data', 'entries'));
    entries = snap.exists() ? (snap.data().entries || {}) : {};
  } catch(e) { entries = {}; }
}

async function saveData() {
  try {
    await setDoc(doc(db, 'users', currentUser, 'data', 'entries'), { entries });
  } catch(e) { console.error('Save failed', e); }
}

function getEntry(d) {
  return entries[dateKey(d)] || { note: '', recordings: [] };
}

function setEntry(d, data) {
  entries[dateKey(d)] = data;
  saveData();
}

// ---- Calendar ----
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month-label');
  label.textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

  grid.innerHTML = '';

  // Day labels
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
  const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
  const daysInPrev = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
  const today = new Date();

  // Previous month overflow
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = daysInPrev - i;
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.innerHTML = `<span class="cal-day-num">${d}</span>`;

    const thisDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
    const key = dateKey(thisDate);

    if (d === today.getDate() && currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) {
      el.classList.add('today');
    }
    if (dateKey(thisDate) === dateKey(selectedDate)) {
      el.classList.add('selected');
    }
    if (entries[key] && (entries[key].blocks?.some(b => b.note || b.piece) || (entries[key].recordings && entries[key].recordings.length))) {
      el.classList.add('has-entry');
    }
    if (goals.some(g => g.date === key && !g.done)) {
      el.classList.add('has-goal');
    } else if (goals.some(g => g.date === key && g.done)) {
      el.classList.add('has-goal-done');
    }

    el.onclick = () => selectDate(thisDate);
    grid.appendChild(el);
  }
}

function selectDate(d) {
  selectedDate = new Date(d);
  renderCalendar();
  loadJournalForDate();
}

function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  renderCalendar();
}

function goToToday() {
  const today = new Date();
  currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
  selectedDate = new Date(today);
  renderCalendar();
  loadJournalForDate();
}

// ---- Journal ----
function formatDateLabel(d) {
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  return d.toLocaleDateString('en-US', opts);
}

function loadJournalForDate() {
  const entry = getEntry(selectedDate);
  document.getElementById('selected-date-label').textContent = formatDateLabel(selectedDate);
  renderBlocks(entry.blocks || []);
  renderRecordings(entry.recordings || []);
}

function saveBlock(index) {
  const entry = getEntry(selectedDate);
  if (!entry.blocks) entry.blocks = [];
  const blockEl = document.querySelectorAll('.practice-block')[index];
  const piece = blockEl.querySelector('.block-piece-input').value;
  const note = blockEl.querySelector('.block-note').value;
  entry.blocks[index] = { piece, note, saved: true };
  setEntry(selectedDate, entry);
  renderCalendar();

  // Update saved view content and collapse
  blockEl.querySelector('.block-saved-piece').innerHTML = piece || '<span style="color:var(--border);font-family:Jost,sans-serif;font-size:0.8rem;">No piece</span>';
  const noteEl = blockEl.querySelector('.block-saved-note');
  if (noteEl) noteEl.textContent = note;
  else if (note) {
    const div = document.createElement('div');
    div.className = 'block-saved-note';
    div.textContent = note;
    blockEl.querySelector('.block-saved-piece').after(div);
  }
  blockEl.classList.add('is-saved');
}

function deleteBlock(index) {
  const entry = getEntry(selectedDate);
  if (!entry.blocks) return;
  entry.blocks.splice(index, 1);
  setEntry(selectedDate, entry);
  renderCalendar();
  renderBlocks(entry.blocks);
}

function renderBlocks(blocks) {
  const list = document.getElementById('blocks-list');
  list.innerHTML = '';
  blocks.forEach((b, i) => createBlockEl(b, i));
}

function createBlockEl(data, index) {
  const list = document.getElementById('blocks-list');
  const block = document.createElement('div');
  block.className = 'practice-block is-saved';

  block.innerHTML = `
    <div class="block-saved-view">
      <div class="block-saved-piece">${data.piece || '<span style="color:var(--border);font-family:Jost,sans-serif;font-size:0.8rem;">No piece</span>'}</div>
      ${data.note ? `<div class="block-saved-note">${data.note}</div>` : ''}
      <div class="block-saved-hint">Tap to edit</div>
    </div>
  `;

  // Tap to open sheet pre-filled for editing
  block.querySelector('.block-saved-view').addEventListener('click', () => {
    openBlockForm(index);
  });

  list.appendChild(block);
}

function addBlock() {
  const entry = getEntry(selectedDate);
  if (!entry.blocks) entry.blocks = [];
  entry.blocks.push({ piece: '', note: '' });
  setEntry(selectedDate, entry);
  renderBlocks(entry.blocks);
  // scroll to new block
  const blocks = document.querySelectorAll('.practice-block');
  if (blocks.length) blocks[blocks.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- Recordings ----
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const entry = getEntry(selectedDate);
    if (!entry.recordings) entry.recordings = [];
    entry.recordings.push({
      name: file.name,
      data: ev.target.result,
      size: file.size
    });
    setEntry(selectedDate, entry);
    renderCalendar();
    renderRecordings(entry.recordings);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderRecordings(recordings) {
  const list = document.getElementById('recordings-list');
  list.innerHTML = '';
  audioPlayers = {};

  recordings.forEach((rec, i) => {
    const item = document.createElement('div');
    item.className = 'recording-item';

    const audio = new Audio(rec.data);
    audioPlayers[i] = { audio, playing: false };

    audio.onended = () => {
      audioPlayers[i].playing = false;
      playBtn.className = 'rec-play';
      playBtn.textContent = '▶';
    };

    const playBtn = document.createElement('button');
    playBtn.className = 'rec-play';
    playBtn.textContent = '▶';
    playBtn.onclick = () => {
      if (audioPlayers[i].playing) {
        audio.pause();
        audioPlayers[i].playing = false;
        playBtn.className = 'rec-play';
        playBtn.textContent = '▶';
      } else {
        // Stop all others
        Object.keys(audioPlayers).forEach(k => {
          if (k != i && audioPlayers[k].playing) {
            audioPlayers[k].audio.pause();
            audioPlayers[k].playing = false;
          }
        });
        list.querySelectorAll('.rec-play').forEach(b => { b.className = 'rec-play'; b.textContent = '▶'; });
        audio.play();
        audioPlayers[i].playing = true;
        playBtn.className = 'rec-play playing';
        playBtn.textContent = '■';
      }
    };

    const info = document.createElement('div');
    info.className = 'rec-info';
    const name = document.createElement('div');
    name.className = 'rec-name';
    name.textContent = rec.name;
    const dur = document.createElement('div');
    dur.className = 'rec-duration';
    dur.textContent = formatSize(rec.size);
    info.appendChild(name);
    info.appendChild(dur);

    const del = document.createElement('button');
    del.className = 'rec-delete';
    del.textContent = '×';
    del.onclick = () => deleteRecording(i);

    item.appendChild(playBtn);
    item.appendChild(info);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function deleteRecording(i) {
  if (audioPlayers[i]) { audioPlayers[i].audio.pause(); }
  const entry = getEntry(selectedDate);
  entry.recordings.splice(i, 1);
  setEntry(selectedDate, entry);
  renderCalendar();
  renderRecordings(entry.recordings);
}

function formatSize(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

// ---- Stats ----
function renderStats() {
  const weekEl = document.getElementById('week-list');
  weekEl.innerHTML = '';

  const weekKeys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    weekKeys.push(dateKey(d));
  }
  const weekEntries = weekKeys.filter(k => entries[k] && (entries[k].note || entries[k].pieces?.length || entries[k].recordings?.length));

  if (weekEntries.length === 0) {
    weekEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🎹</div><div>No entries this week yet.</div></div>';
    return;
  }

  weekEntries.forEach(key => {
    const entry = entries[key];
    const d = new Date(key + 'T00:00:00');
    const el = document.createElement('div');
    el.className = 'recent-entry';
    el.innerHTML = `
      <div class="recent-date">${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
      ${entry.pieces?.length
        ? entry.pieces.map((p, i) => `<div class="recent-piece-line"><span class="recent-piece-name">${p}</span>${i === entry.pieces.length - 1 && entry.note ? `<span class="recent-piece-note"> — ${entry.note}</span>` : ''}</div>`).join('')
        : entry.note ? `<div class="recent-piece-line"><span class="recent-piece-note">${entry.note}</span></div>`
        : entry.recordings?.length ? `<div class="recent-piece-line"><span class="recent-piece-note">🎵 ${entry.recordings.length} recording(s)</span></div>` : ''
      }
    `;
    el.onclick = () => {
      selectedDate = new Date(key + 'T00:00:00');
      currentDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      switchView('journal');
    };
    weekEl.appendChild(el);
  });
}

// ---- Navigation ----
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.getElementById(`nav-${view}`).classList.add('active');

  if (view === 'stats') renderStats();
  if (view === 'all') renderAll();
  if (view === 'journal') { renderCalendar(); loadJournalForDate(); }
  if (view === 'goals') renderGoals();

  // Hide calendar only on Journal view
  document.getElementById('cal-section').style.display = view === 'all' ? 'none' : '';
}

// ---- All Entries (Journal) ----
function openDayModal(key) {
  const entry = entries[key];
  const d = new Date(key + 'T00:00:00');
  document.getElementById('day-modal-date').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const body = document.getElementById('day-modal-body');
  body.innerHTML = '';

  // Blocks (piece + note)
  const blocks = entry.blocks?.filter(b => b.piece || b.note) || [];
  // Legacy: pieces + note
  const pieces = entry.pieces || [];
  const legacyNote = entry.note || '';

  if (blocks.length > 0) {
    blocks.forEach(b => {
      const div = document.createElement('div');
      div.className = 'day-modal-block';
      div.innerHTML = `
        ${b.piece ? `<div class="day-modal-piece">${b.piece}</div>` : ''}
        ${b.note ? `<div class="day-modal-note">${b.note}</div>` : ''}
      `;
      body.appendChild(div);
    });
  } else if (pieces.length > 0 || legacyNote) {
    const div = document.createElement('div');
    div.className = 'day-modal-block';
    div.innerHTML = `
      ${pieces.map(p => `<div class="day-modal-piece">${p}</div>`).join('')}
      ${legacyNote ? `<div class="day-modal-note">${legacyNote}</div>` : ''}
    `;
    body.appendChild(div);
  }

  if (entry.recordings?.length) {
    const recSection = document.createElement('div');
    recSection.className = 'day-modal-recordings-section';
    recSection.innerHTML = `<div class="day-modal-rec-label">Recordings</div>`;

    entry.recordings.forEach((rec, i) => {
      const item = document.createElement('div');
      item.className = 'day-modal-rec-item';

      const audio = new Audio(rec.data);
      let playing = false;

      const playBtn = document.createElement('button');
      playBtn.className = 'day-modal-play-btn';
      playBtn.innerHTML = '▶';

      const info = document.createElement('div');
      info.className = 'day-modal-rec-info';
      info.innerHTML = `<div class="day-modal-rec-name">${rec.name}</div>`;

      const progress = document.createElement('div');
      progress.className = 'day-modal-rec-progress';
      const bar = document.createElement('div');
      bar.className = 'day-modal-rec-bar';
      progress.appendChild(bar);
      info.appendChild(progress);

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) bar.style.width = (audio.currentTime / audio.duration * 100) + '%';
      });
      audio.addEventListener('ended', () => {
        playing = false;
        playBtn.innerHTML = '▶';
        bar.style.width = '0%';
      });

      playBtn.addEventListener('click', () => {
        if (playing) {
          audio.pause();
          playBtn.innerHTML = '▶';
        } else {
          // Pause any other playing audio in modal
          document.querySelectorAll('.day-modal-rec-audio-playing').forEach(a => {
            a.pause();
            a.dataset.btnRef && document.getElementById(a.dataset.btnRef) && (document.getElementById(a.dataset.btnRef).innerHTML = '▶');
          });
          audio.play();
          playBtn.innerHTML = '⏸';
        }
        playing = !playing;
      });

      item.appendChild(playBtn);
      item.appendChild(info);
      recSection.appendChild(item);
    });

    body.appendChild(recSection);
  }

  if (body.children.length === 0) {
    body.innerHTML = '<div class="day-modal-empty">No details recorded.</div>';
  }

  document.getElementById('day-modal-overlay').classList.add('open');
}

function closeDayModal() {
  document.getElementById('day-modal-overlay').classList.remove('open');
  // Stop any playing audio
  document.querySelectorAll('.day-modal-play-btn').forEach(btn => btn.innerHTML = '▶');
}

function renderAll() {
  const list = document.getElementById('all-entries-list');
  list.innerHTML = '';

  const hasContent = k => {
    const e = entries[k];
    return e.blocks?.some(b => b.piece || b.note) || e.note || e.pieces?.length || e.recordings?.length;
  };

  const keys = Object.keys(entries)
    .filter(hasContent)
    .sort((a, b) => b.localeCompare(a));

  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎹</div><div>No entries yet.<br>Start logging today!</div></div>';
    return;
  }

  keys.forEach(key => {
    const entry = entries[key];
    const d = new Date(key + 'T00:00:00');
    const el = document.createElement('div');
    el.className = 'recent-entry';

    // Build piece list from blocks (new) or legacy pieces field
    const blocks = entry.blocks?.filter(b => b.piece || b.note) || [];
    const pieces = blocks.length
      ? blocks.map(b => b.piece).filter(Boolean)
      : (entry.pieces || []);
    const previewNote = blocks.length
      ? (blocks[0]?.note || '')
      : (entry.note || '');

    el.innerHTML = `
      <div class="recent-date">${d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
      ${pieces.length
        ? pieces.map((p, i) => `<div class="recent-piece-line"><span class="recent-piece-name">${p}</span>${i === pieces.length - 1 && previewNote ? `<span class="recent-piece-note"> — ${previewNote}</span>` : ''}</div>`).join('')
        : previewNote ? `<div class="recent-piece-line"><span class="recent-piece-note">${previewNote}</span></div>`
        : entry.recordings?.length ? `<div class="recent-piece-line"><span class="recent-piece-note">🎵 ${entry.recordings.length} recording(s)</span></div>` : ''
      }
    `;
    el.onclick = () => openDayModal(key);
    list.appendChild(el);
  });
}

// ---- Goals ----
let goals = [];

function loadGoals() {
  return getDoc(doc(db, 'users', currentUser, 'data', 'goals'))
    .then(snap => { goals = snap.exists() ? (snap.data().goals || []) : []; })
    .catch(() => { goals = []; });
}

function saveGoals() {
  return setDoc(doc(db, 'users', currentUser, 'data', 'goals'), { goals })
    .catch(e => console.error('Save goals failed', e));
}

let editingBlockIndex = null;

function openBlockForm(index = null) {
  editingBlockIndex = index;
  const entry = getEntry(selectedDate);
  const data = index !== null ? (entry.blocks?.[index] || {}) : {};
  document.getElementById('block-sheet-piece').value = data.piece || '';
  document.getElementById('block-sheet-note').value = data.note || '';

  // Show/hide delete button
  const delBtn = document.getElementById('block-sheet-delete');
  if (delBtn) delBtn.style.display = index !== null ? 'block' : 'none';

  document.getElementById('block-sheet-overlay').classList.add('open');
  document.getElementById('block-sheet').classList.add('open');
  setTimeout(() => document.getElementById('block-sheet-piece').focus(), 350);
}

function closeBlockForm() {
  const sheet = document.getElementById('block-sheet');
  sheet.classList.remove('open');
  sheet.style.bottom = '';
  document.getElementById('block-sheet-overlay').classList.remove('open');
}

function saveBlockFromSheet() {
  const piece = document.getElementById('block-sheet-piece').value.trim();
  const note = document.getElementById('block-sheet-note').value.trim();
  if (!piece && !note) return;
  const entry = getEntry(selectedDate);
  if (!entry.blocks) entry.blocks = [];
  if (editingBlockIndex !== null) {
    entry.blocks[editingBlockIndex] = { piece, note, saved: true };
  } else {
    entry.blocks.push({ piece, note, saved: true });
  }
  setEntry(selectedDate, entry);
  closeBlockForm();
  renderCalendar();
  renderBlocks(entry.blocks);
}

function deleteBlockFromSheet() {
  if (editingBlockIndex === null) return;
  const entry = getEntry(selectedDate);
  entry.blocks.splice(editingBlockIndex, 1);
  setEntry(selectedDate, entry);
  closeBlockForm();
  renderCalendar();
  renderBlocks(entry.blocks);
}

function openGoalForm() {
  document.getElementById('goal-sheet-overlay').classList.add('open');
  document.getElementById('goal-sheet').classList.add('open');
  setTimeout(() => document.getElementById('goal-input').focus(), 350);
}

function closeGoalForm() {
  const sheet = document.getElementById('goal-sheet');
  sheet.classList.remove('open');
  sheet.style.bottom = '';
  document.getElementById('goal-sheet-overlay').classList.remove('open');
}

function addGoal() {
  const text = document.getElementById('goal-input').value.trim();
  const date = document.getElementById('goal-date').value;
  if (!text) return;
  goals.push({ id: Date.now(), text, date, done: false });
  saveGoals();
  document.getElementById('goal-input').value = '';
  document.getElementById('goal-date').value = '';
  closeGoalForm();
  renderCalendar();
  renderGoals();
}

function toggleGoal(id) {
  const g = goals.find(g => g.id === id);
  if (g) { g.done = !g.done; saveGoals(); renderCalendar(); renderGoals(); }
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  saveGoals();
  renderCalendar();
  renderGoals();
}

function launchConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  document.body.appendChild(wrap);
  const colors = ['#b89a6a','#2c2c2c','#c0392b','#f1c40f','#27ae60','#2980b9','#8e44ad'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (6 + Math.random() * 6) + 'px';
    p.style.height = (6 + Math.random() * 10) + 'px';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.remove(), 3500);
}

function renderGoals() {
  const list = document.getElementById('goals-list');
  list.innerHTML = '';

  const sorted = [...goals].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><div>No goals yet.<br>Add one above!</div></div>';
    return;
  }

  sorted.forEach(g => {
    const today = new Date().toISOString().split('T')[0];
    const isOverdue = g.date && g.date < today && !g.done;

    // Wrapper
    const wrap = document.createElement('div');
    wrap.className = 'goal-item-wrap';

    // Red delete background
    const bg = document.createElement('div');
    bg.className = 'goal-item-delete-bg';
    bg.textContent = 'Delete';

    // Goal item
    const item = document.createElement('div');
    item.className = 'goal-item' + (g.done ? ' done' : '');

    const check = document.createElement('button');
    check.className = 'goal-check' + (g.done ? ' checked' : '');
    check.textContent = g.done ? '✓' : '';
    check.onclick = () => toggleGoal(g.id);

    const body = document.createElement('div');
    body.className = 'goal-body';

    const text = document.createElement('div');
    text.className = 'goal-text' + (g.done ? ' done' : '');
    text.textContent = g.text;
    body.appendChild(text);

    if (g.date) {
      const due = document.createElement('div');
      due.className = 'goal-due' + (isOverdue ? ' overdue' : '');
      const d = new Date(g.date + 'T00:00:00');
      due.textContent = (isOverdue ? 'Overdue · ' : 'By · ') + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      body.appendChild(due);
    }

    item.appendChild(check);
    item.appendChild(body);
    wrap.appendChild(bg);
    wrap.appendChild(item);
    list.appendChild(wrap);

    // Swipe logic
    let startX = 0, currentX = 0, swiping = false;
    const DELETE_THRESHOLD = 80;
    const DONE_THRESHOLD = 80;

    function onStart(e) {
      startX = e.touches ? e.touches[0].clientX : e.clientX;
      currentX = 0;
      swiping = true;
      item.classList.add('swiping');
    }
    function onMove(e) {
      if (!swiping) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      currentX = x - startX;
      item.style.transform = `translateX(${currentX}px)`;
      // tint bg red (left) or gold (right)
      if (currentX < 0) {
        bg.style.background = '#c0392b';
        bg.textContent = 'Delete';
        bg.style.left = 'auto'; bg.style.right = '0';
      } else {
        bg.style.background = 'var(--gold)';
        bg.textContent = '★ Done';
        bg.style.right = 'auto'; bg.style.left = '0';
      }
    }
    function onEnd() {
      if (!swiping) return;
      swiping = false;
      item.classList.remove('swiping');
      if (currentX <= -DELETE_THRESHOLD) {
        item.style.transition = 'transform 0.2s ease';
        item.style.transform = `translateX(-100%)`;
        wrap.style.transition = 'max-height 0.3s ease, opacity 0.3s ease, margin-bottom 0.3s ease';
        wrap.style.maxHeight = wrap.offsetHeight + 'px';
        setTimeout(() => { wrap.style.maxHeight = '0'; wrap.style.opacity = '0'; wrap.style.marginBottom = '0'; }, 150);
        setTimeout(() => deleteGoal(g.id), 400);
      } else if (currentX >= DONE_THRESHOLD && !g.done) {
        item.style.transition = 'transform 0.2s ease';
        item.style.transform = `translateX(100%)`;
        launchConfetti();
        setTimeout(() => {
          toggleGoal(g.id);
        }, 2800);
      } else {
        item.style.transition = 'transform 0.2s ease';
        item.style.transform = 'translateX(0)';
      }
    }

    item.addEventListener('touchstart', onStart, { passive: true });
    item.addEventListener('touchmove', onMove, { passive: true });
    item.addEventListener('touchend', onEnd);
    item.addEventListener('mousedown', onStart);
    item.addEventListener('mousemove', onMove);
    item.addEventListener('mouseup', onEnd);
    item.addEventListener('mouseleave', onEnd);
  });
}

// ---- iOS keyboard: shift sheets above keyboard ----
function setupKeyboardShift() {
  if (!window.visualViewport) return;
  window.visualViewport.addEventListener('resize', () => {
    const sheets = document.querySelectorAll('.goal-sheet.open');
    const keyboardHeight = window.innerHeight - window.visualViewport.height;
    sheets.forEach(sheet => {
      sheet.style.bottom = keyboardHeight > 50 ? keyboardHeight + 'px' : '';
    });
  });
}
setupKeyboardShift();
